<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เข้าสู่ระบบ - IT Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<div id="loader" class="loader-overlay" style="display:none;">
  <div class="spinner"></div>
</div>
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; justify-content:center; align-items:center;">
    <div class="popup-box" style="background:#fff; padding:2rem; border-radius:15px; text-align:center; max-width:350px; width:80%;">
        <div id="popup-title" style="font-weight:bold; font-size:1.2rem; margin-bottom:10px;"></div>
        <div id="popup-message" style="margin-bottom:20px; color:#666;"></div>
        <button onclick="closePopup()" style="width:100%; padding:10px; border:none; border-radius:5px; background:#28a745; color:#fff; cursor:pointer;">ตกลง</button>
    </div>
</div>


<div class="login-wrapper">
  <header class="login-header">
    <img src="./โรงพยาบาลอุดรธานี .png" class="header-logo" alt="Udon Hospital Logo">
    <h1>โรงพยาบาลอุดรธานี</h1>
    <p>ระบบบริหารจัดการครุภัณฑ์คอมพิวเตอร์และบริการ</p>
  </header>

  <main class="login-card">
    <div class="form-group">
      <label for="username">👷 Email / Username</label>
      <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน หรืออีเมล">
    </div>

    <div class="form-group">
      <label for="password">🔒 Password</label>
      <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      🛡️ เข้าสู่ระบบ
    </button>

    <div class="card-footer" style="text-align:center; margin-top:20px; font-size: 0.9rem; color: #666;">
      ยังไม่มีบัญชีผู้ใช้งาน? <a href="register.html" style="font-weight: 600;">ลงทะเบียนที่นี่</a>
    </div>
  </main>
</div>

<script src="js/main.js"></script>
<script src="js/api.js"></script>

<script>
/* --- รวม ApiService ไว้ในหน้านี้เลย --- */
const ApiService = {
  async login(username, password) {
    const url = "https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec";
    try {
      const response = await fetch(url, {
        method: "POST",
        body: JSON.stringify({
          action: "checkLogin",
          data: { user: username, pass: password }
        })
      });
      return await response.json();
    } catch (error) {
      console.error("API Error:", error);
      throw error;
    }
  }
};

/* --- ฟังก์ชันจัดการ UI พื้นฐาน --- */
const Loader = {
  show: () => { document.getElementById('loader').style.display = 'flex'; },
  hide: () => { document.getElementById('loader').style.display = 'none'; }
};

const Auth = {
  setSession: (user) => { localStorage.setItem("it_session", JSON.stringify(user)); }
};

function showModal(title, message, type = 'success') {
  const popup = document.getElementById('popup');
  document.getElementById('popup-title').innerText = (type === 'error' ? "❌ " : "🔔 ") + title;
  document.getElementById('popup-message').innerText = message;
  popup.style.display = 'flex';
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}

/* --- ฟังก์ชัน Login หลัก --- */
async function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();

  if (!user || !pass) {
    showModal("ข้อมูลไม่ครบ", "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน", "warning");
    return;
  }

  Loader.show();

  try {
    const result = await ApiService.login(user, pass);

    if (result.success) {
      showModal("สำเร็จ!", "ยินดีต้อนรับเข้าสู่ระบบ", "success");
      Auth.setSession(result.user);
      setTimeout(() => { window.location.href = "index.html"; }, 1500);
    } else {
      Loader.hide();
      showModal("เข้าสู่ระบบไม่สำเร็จ", result.message || "ข้อมูลไม่ถูกต้อง", "error");
    }
  } catch (error) {
    Loader.hide();
    showModal("เกิดข้อผิดพลาด", "ไม่สามารถติดต่อ Server ได้ (ตรวจสอบการต่อเน็ต/URL GAS)", "error");
  }
}
</script>

</body>
</html>
