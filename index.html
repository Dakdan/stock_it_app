<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM - UDORN THANI HOSPITAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; min-height: 100vh; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.5rem; border: 1px solid #fce7f3; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card-pro:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(190, 24, 93, 0.15); }
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
        /* สไตล์ปุ่ม Navigation */
        nav button.active { color: #be185d; border-bottom: 4px solid #be185d; }
    </style>
</head>
<body class="pb-24">

    <div id="loader" class="overlay">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-pink-600 border-t-transparent mb-4"></div>
            <p class="text-pink-600 font-bold">กำลังอัปเดตข้อมูล...</p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-8 sticky top-0 z-50 shadow-xl rounded-b-[2rem]">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-white p-1.5 rounded-2xl shadow-inner">
                    <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight">ITSM UDON</h1>
                    <p id="u-fname" class="text-xs opacity-90 font-light italic">Loading user...</p>
                </div>
            </div>
            <button onclick="logout()" class="bg-white/20 hover:bg-white/30 p-3 rounded-2xl transition-colors text-xl">🚪</button>
        </div>
    </header>

    <nav class="bg-white/90 backdrop-blur-lg sticky top-0 z-40 border-b border-pink-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-1" class="active flex-1 py-4 text-xs font-bold uppercase tracking-widest transition-all">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-2" class="flex-1 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest transition-all">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-3" class="flex-1 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest transition-all">Tools</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-5 mt-4">
        
        <div id="tab1" class="tab-content active space-y-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div class="bg-white p-4 rounded-3xl shadow-sm text-center border-b-4 border-pink-500">
                    <p class="text-[10px] text-slate-400 font-bold">รอรับงาน</p>
                    <p id="count-wait" class="text-2xl font-black text-pink-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm text-center border-b-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 font-bold">กำลังทำ</p>
                    <p id="count-doing" class="text-2xl font-black text-blue-500">0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm text-center border-b-4 border-green-500">
                    <p class="text-[10px] text-slate-400 font-bold">สำเร็จ</p>
                    <p id="count-done" class="text-2xl font-black text-green-500">0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm text-center border-b-4 border-slate-300">
                    <p class="text-[10px] text-slate-400 font-bold">ทั้งหมด</p>
                    <p id="count-all" class="text-2xl font-black text-slate-700">0</p>
                </div>
            </div>
            <div id="job-list-dashboard" class="space-y-4"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <h2 class="text-slate-800 font-bold px-2">งานของฉัน</h2>
            <div id="job-list-myjob" class="space-y-4"></div>
        </div>

    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-pink-600 text-lg italic"># Job Details</h3>
                <button onclick="closeModal('modal-detail')" class="text-slate-300 hover:text-slate-500 text-3xl">&times;</button>
            </div>
            <div id="detail-content" class="space-y-4"></div>
            <div id="detail-actions" class="mt-8"></div>
        </div>
    </div>

    <div id="modal-logout" class="overlay">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm mx-4 shadow-2xl p-10 text-center relative">
            <div id="logout-alert" class="inner-alert text-pink-600 font-bold text-lg">Bye Bye! 👋</div>
            <p class="text-4xl mb-4">🏠</p>
            <h3 class="text-xl font-bold text-slate-800 mb-6">ต้องการออกจากระบบ?</h3>
            <div class="flex gap-3">
                <button onclick="closeModal('modal-logout')" class="flex-1 py-4 text-slate-400 font-bold bg-slate-50 rounded-2xl">ไม่</button>
                <button onclick="confirmLogout()" class="flex-1 py-4 pink-grad text-white rounded-2xl font-bold shadow-lg">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & Store ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        let store = { AllJobs: [], BackupData: [] };
        let currentUser = null;

        // --- Auth & Init ---
        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) {
                window.location.replace("./login.html");
                return;
            }
            currentUser = JSON.parse(session);
            document.getElementById('u-fname').innerText = `สวัสดี, ${currentUser.UserName}`;
            await loadData();
        }

        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getInitialData', data: { USERID: currentUser.USERID } }) 
                });
                const result = await res.json();
                if (result.success) {
                    store = result;
                    updateDashboard();
                }
            } catch (e) { console.error("Load Error"); }
            showLoading(false);
        }

        // --- UI Logic ---
        function updateDashboard() {
            const jobs = store.AllJobs || [];
            
            // Stats
            document.getElementById('count-wait').innerText = jobs.filter(j => j.Status === 'รอรับงาน').length;
            document.getElementById('count-doing').innerText = jobs.filter(j => j.Status === 'กำลังดำเนินการ').length;
            document.getElementById('count-done').innerText = jobs.filter(j => j.Status === 'เสร็จสิ้น').length;
            document.getElementById('count-all').innerText = jobs.length;

            // Render List
            const list = document.getElementById('job-list-dashboard');
            list.innerHTML = jobs.map(j => `
                <div onclick="openDetail('${j.JobID}')" class="card-pro p-6 border-l-[10px] ${j.Status === 'รอรับงาน' ? 'border-pink-500' : 'border-blue-400'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${j.JobID} | ${j.Department}</p>
                            <h3 class="font-bold text-slate-700 text-md mt-1">${j.Problem}</h3>
                        </div>
                        <span class="text-[9px] font-bold px-2 py-1 rounded-lg ${j.Status === 'รอรับงาน' ? 'bg-pink-100 text-pink-600' : 'bg-blue-100 text-blue-600'}">${j.Status}</span>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const job = store.AllJobs.find(j => String(j.JobID) === String(id));
            if (!job) return;

            document.getElementById('detail-content').innerHTML = `
                <div class="bg-pink-50 p-5 rounded-3xl">
                    <p class="text-[10px] font-bold text-pink-400 uppercase">ปัญหาที่พบ</p>
                    <p class="font-bold text-slate-700 text-lg leading-tight">${job.Problem}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="px-2"><p class="text-[10px] text-slate-400 font-bold uppercase">หน่วยงาน</p><p class="font-bold text-slate-600 text-sm">${job.Department}</p></div>
                    <div class="px-2"><p class="text-[10px] text-slate-400 font-bold uppercase">ลำดับความสำคัญ</p><p class="font-bold text-pink-600 text-sm">${job.Priority || 'ปกติ'}</p></div>
                </div>
            `;
            
            let btnHTML = `<button onclick="closeModal('modal-detail')" class="w-full py-4 text-slate-400 font-bold text-xs uppercase tracking-widest">ปิด</button>`;
            if (job.Status === 'รอรับงาน' && currentUser.UserTypeID === 'IT') {
                btnHTML = `<button class="w-full py-4 pink-grad text-white rounded-3xl font-bold shadow-lg mb-2">⚡ รับงานเดี๋ยวนี้</button>` + btnHTML;
            }
            
            document.getElementById('detail-actions').innerHTML = btnHTML;
            document.getElementById('modal-detail').style.display = 'flex';
        }

        // --- Shared Helpers ---
        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active', 'text-pink-600'));
            document.getElementById('tab' + n).classList.add('active');
            const btn = document.getElementById('nav-' + n);
            btn.classList.add('active', 'text-pink-600');
        }

        function showLoading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { document.getElementById('modal-logout').style.display = 'flex'; }
        
        function confirmLogout() {
            localStorage.clear();
            document.getElementById('logout-alert').style.display = 'flex';
            setTimeout(() => window.location.replace("./login.html"), 1000);
        }

        // Start
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
