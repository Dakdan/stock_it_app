<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...<br><span class="text-[9px] font-normal text-slate-400 italic">กรุณารอสักครู่</span></p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบจัดการงานซ่อมและบริการ กลุ่มงาน: เทคโนโลยีสารสนเทศ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p>
                    <p id="u-type-name" class="text-[9px] opacity-70"></p>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase tracking-wider">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div id="job-list-myjob" class="space-y-3"></div>
            <hr class="border-pink-100 my-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-blue-600 font-bold text-sm border-l-4 border-blue-500 pl-2 uppercase tracking-wide">IT Ticket</h2>
                <button onclick="openITTicketForm()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold">+ บันทึกงาน</button>
            </div>
            <div id="it-ticket-list" class="space-y-3"></div>
        </div>
        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative">
            <div id="detail-alert" class="inner-alert"><p id="detail-alert-text" class="text-pink-600 font-bold">ดำเนินการสำเร็จ</p></div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                    <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
                </div>
                <div id="detail-content" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
                <div id="detail-actions" class="mt-6 flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modal-close-job" class="overlay">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden p-6">
            <h3 class="font-bold text-green-700 text-lg mb-4">✅ บันทึกการปิดงาน</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">ประเภทงาน</label>
                        <select id="close-job-type" class="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">หมวดหมู่ย่อย</label>
                        <select id="close-job-subtype" class="w-full p-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold"></select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">รายละเอียดการแก้ไข</label>
                    <textarea id="close-job-note" class="w-full p-4 bg-slate-50 border rounded-[1.5rem] text-sm h-28" placeholder="ระบุสิ่งที่ได้ดำเนินการ..."></textarea>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal('modal-close-job')" class="flex-1 py-4 text-slate-500 font-bold">ยกเลิก</button>
                    <button id="btn-confirm-close" class="flex-[2] py-4 bg-green-500 text-white rounded-2xl font-bold">บันทึกปิดงาน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-transfer" class="overlay">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm mx-4 shadow-2xl">
            <h3 class="font-bold text-pink-600 mb-4">🔄 จัดการงาน</h3>
            <select id="select-staff" class="w-full p-3 bg-white border rounded-xl mb-3"></select>
            <textarea id="transfer-reason" placeholder="เหตุผล..." class="w-full p-3 bg-slate-50 border rounded-xl h-20 mb-3"></textarea>
            <button id="btn-confirm-transfer" class="w-full pink-grad text-white rounded-xl font-bold py-3 shadow-lg">ยืนยัน</button>
        </div>
    </div>

    <div id="modal-success" class="overlay">
        <div class="bg-white rounded-[2rem] p-8 text-center shadow-2xl mx-4"><h3 class="text-xl font-bold text-slate-800">ดำเนินการสำเร็จ</h3></div>
    </div>

    <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
    let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], BackupData: [], JobTypeMapping: {} };
    let currentUser = null;
    let currentTab = 1;

    async function initApp() {
        const session = localStorage.getItem("it_session");
        if (!session) { window.location.replace("./login.html"); return; }
        currentUser = JSON.parse(session);
        document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
        document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "Staff";
        await loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData', data: { userName: currentUser.UserName, USERID: currentUser.USERID } }) });
            const result = await res.json();
            if (result.success) {
                store = result;
                renderDashboard();
                renderMyJobs();
                renderITTicketList();
                renderSystemLinks();
            }
        } catch (e) { console.error("Error", e); }
        showLoading(false);
    }

    function renderDashboard() {
        const jobs = store.AllJobs || [];
        updateStats(jobs);
        document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => {
            const status = String(j.Status || '').trim();
            const staff = (store.StaffList || []).find(s => String(s.id).trim() === String(j.Owner).trim());
            const ownerName = staff ? staff.name : (j.Owner && j.Owner !== "-" ? j.Owner : "ยังไม่มีผู้ดูแล");
            let borderClass = status === 'รอรับงาน' ? "border-pink-500 status-pulse" : (status === 'กำลังดำเนินการ' ? "border-blue-500" : "border-slate-200");

            return `<div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${borderClass} mb-4">
                <div class="flex justify-between items-start mb-3">
                    <div><span class="text-[10px] font-bold text-slate-400">#${j.JobID}</span></div>
                    <span class="text-[10px] font-black uppercase px-2 py-1 rounded-lg ${status === 'รอรับงาน' ? 'text-pink-600 bg-pink-50' : 'text-blue-600 bg-blue-50'}">${status}</span>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-pink-500 uppercase">${j.JobType || ''}</p>
                    <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                    <div class="flex justify-between items-end pt-2 border-t mt-2">
                        <div><p class="text-[8px] text-slate-400 font-bold uppercase">ผู้ดูแล</p><p class="text-[10px] font-bold text-blue-600">👷 ${ownerName}</p></div>
                        <div class="text-right"><p class="text-[9px] font-bold text-slate-500">🏨 ${j.Department}</p></div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function viewJobDetail(jobId) {
        const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
        if (!job) return;
        const status = String(job.Status || '').trim();
        const role = String(currentUser.UserTypeID).toUpperCase().trim();
        const isOwner = String(job.Owner).trim() === String(currentUser.USERID).trim();
        const staff = (store.StaffList || []).find(s => String(s.id).trim() === String(job.Owner).trim());

        let assetHTML = "";
        if (job.AssetCode && job.AssetCode !== "-") {
            const asset = (store.BackupData || []).find(a => String(a.NOID) === String(job.AssetCode));
            if (asset) assetHTML = `<div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mt-4 text-xs">
                <p class="text-[10px] font-bold text-blue-500 mb-1 uppercase">📦 ข้อมูลครุภัณฑ์</p>
                <p><b>ชื่อ:</b> ${asset.AssetName}</p><p><b>สเปค:</b> ${asset.Spac}</p>
            </div>`;
        }

        // ตรวจสอบ Priority และ Phone จากตัวแปร job (ห้ามแก้ส่วนนี้)
        document.getElementById('detail-content').innerHTML = `
            <div class="bg-pink-50 p-4 rounded-2xl border border-pink-100">
                <p class="text-[10px] font-bold text-pink-400 uppercase">ปัญหา [${job.JobType}]</p>
                <p class="font-bold text-slate-800">${job.Problem}</p>
            </div>
            ${assetHTML}
            <div class="grid grid-cols-2 gap-4 mt-4 text-xs">
                <div><p class="text-[10px] text-slate-400 font-bold uppercase">หน่วยงาน</p><p>${job.Department}</p></div>
                <div><p class="text-[10px] text-slate-400 font-bold uppercase">ความสำคัญ</p><p class="text-pink-600 font-bold">${job.Priority || '-'}</p></div>
                <div class="col-span-2 border-t pt-2"><p class="text-[10px] text-slate-400 font-bold uppercase">เบอร์โทรศัพท์ติดต่อ</p><p class="text-blue-600 font-bold text-sm">${job.phon || '-'}</p></div>
                <div class="col-span-2 border-t pt-2"><p class="text-[10px] text-slate-400 font-bold">ผู้ดูแล: ${staff ? staff.name : (job.Owner || 'ยังไม่มี')}</p></div>
            </div>`;

        let btns = "";
        if (currentTab === 1) {
            if (status === 'รอรับงาน') {
                if (role === 'IT') btns = `<button onclick="handleJobUI('${job.JobID}', 'accept')" class="w-full py-4 pink-grad text-white rounded-2xl font-bold">⚡ รับงาน</button>`;
                else if (role === 'BOSS') btns = `<button onclick="openTransfer('${job.JobID}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">📋 มอบหมายงาน</button>`;
            }
        } else if (currentTab === 2 && isOwner && status === 'กำลังดำเนินการ') {
            btns = `<div class="grid grid-cols-2 gap-2">
                <button onclick="openCloseJobForm('${job.JobID}')" class="py-4 bg-green-500 text-white rounded-2xl font-bold">✅ ปิดงาน</button>
                <button onclick="openTransfer('${job.JobID}')" class="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold border">🔄 โอนงาน</button>
            </div>`;
        }
        document.getElementById('detail-actions').innerHTML = btns + `<button onclick="closeModal('modal-detail')" class="w-full py-2 text-slate-400 text-[10px] uppercase font-bold">ปิดหน้าต่าง</button>`;
        document.getElementById('modal-detail').style.display = 'flex';
    }

    // ฟังก์ชันเปิด Modal ปิดงาน (Fix เฉพาะ Dropdown)
    function openCloseJobForm(jobId) {
        closeModal('modal-detail');
        const typeSelect = document.getElementById('close-job-type');
        const subSelect = document.getElementById('close-job-subtype');
        const mapping = store.JobTypeMapping || {};

        // เติมประเภทงาน
        typeSelect.innerHTML = '<option value="" disabled selected>-- เลือกประเภท --</option>';
        Object.keys(mapping).forEach(code => {
            typeSelect.innerHTML += `<option value="${code}">${mapping[code].JobTypeName}</option>`;
        });

        // Event เมื่อเลือกประเภท ให้เติมหมวดหมู่ย่อย
        typeSelect.onchange = function() {
            const code = this.value;
            const subs = mapping[code]?.SubTypes || [];
            subSelect.innerHTML = '<option value="" disabled selected>-- เลือกหมวดหมู่ย่อย --</option>';
            subs.forEach(s => {
                subSelect.innerHTML += `<option value="${s.SubTypeName}">${s.SubTypeName}</option>`;
            });
        };

        document.getElementById('btn-confirm-close').onclick = async () => {
            const note = document.getElementById('close-job-note').value;
            if (!typeSelect.value || !subSelect.value || !note) return alert("กรุณากรอกข้อมูลให้ครบ");
            await handleJobUI(jobId, 'done', { Note: note, JobType: typeSelect.options[typeSelect.selectedIndex].text, JobSubType: subSelect.value });
        };
        document.getElementById('modal-close-job').style.display = 'flex';
    }

    function renderMyJobs() {
        const myJobs = (store.AllJobs || []).filter(j => String(j.Owner).trim() === String(currentUser.USERID).trim() && String(j.Status).trim() === 'กำลังดำเนินการ');
        document.getElementById('job-list-myjob').innerHTML = myJobs.map(j => `<div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 border-blue-500 mb-3"><h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3></div>`).join('');
    }

    function updateStats(jobs) {
        const getCount = (s) => jobs.filter(j => String(j.Status).trim() === s).length;
        document.getElementById('count-wait').innerText = getCount('รอรับงาน');
        document.getElementById('count-doing').innerText = getCount('กำลังดำเนินการ');
        document.getElementById('count-spare').innerText = getCount('รออะไหล่');
        document.getElementById('count-done').innerText = getCount('เสร็จสิ้น');
        document.getElementById('count-cancel').innerText = getCount('ยกเลิก');
    }

    async function handleJobUI(jobId, type, extra = {}) {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateJobStatus', data: { JobID: jobId, type: type, Owner: currentUser.USERID, By: currentUser.UserName, ...extra } }) });
            if ((await res.json()).success) { closeModal('modal-detail'); closeModal('modal-close-job'); closeModal('modal-transfer'); document.getElementById('modal-success').style.display = 'flex'; await loadData(); setTimeout(() => closeModal('modal-success'), 1500); }
        } catch (e) { alert("Error"); }
        showLoading(false);
    }

    function openITTicketForm() { /* ฟังก์ชัน IT Ticket ของคุณ */ }
    function renderITTicketList() { /* ฟังก์ชัน Render Ticket ของคุณ */ }
    function renderSystemLinks() { /* ฟังก์ชัน Render Link ของคุณ */ }
    function switchTab(n) { currentTab = n; document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tab' + n).classList.add('active'); }
    function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openTransfer(jobId) { /* ฟังก์ชันโอนงานของคุณ */ }
    function logout() { localStorage.clear(); window.location.replace("./login.html"); }

    document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
