<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">เทคโนโลยีสารสนเทศ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p>
                    <p id="u-type-name" class="text-[9px] opacity-70"></p>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2 text-center">
                <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-slate-400">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-slate-400">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-slate-400">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-slate-400">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl shadow-sm"><p class="text-[9px] text-slate-400">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div id="job-list-myjob" class="space-y-3"></div>
            <div class="flex justify-between items-center px-1 mt-6">
                <h2 class="text-blue-600 font-bold text-sm">IT Ticket</h2>
                <button onclick="openITTicketForm()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md">+ บันทึกงาน</button>
            </div>
            <div id="it-ticket-list" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative">
            <div class="p-6 text-left">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                    <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
                </div>
                <div id="detail-content" class="space-y-4 max-h-[60vh] overflow-y-auto">
                    </div>
                <div id="detail-actions" class="mt-6 flex flex-col gap-3">
                    </div>
            </div>
        </div>
    </div>

    <div id="modal-close-job" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl relative overflow-hidden p-6">
            <h3 class="font-bold text-green-600 text-lg mb-4">✅ บันทึกรายละเอียดการปิดงาน</h3>
            <div class="space-y-3 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-400">ประเภทงาน (JobTypeName)</label>
                    <select id="close-job-type" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100" onchange="filterSubTypes(this.value)"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400">งานย่อย (SubTypeName)</label>
                    <select id="close-subtype" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400">รายละเอียดการแก้ไข (ServiceMA)</label>
                    <textarea id="close-service-ma" class="w-full p-2 bg-slate-50 rounded-xl text-sm h-20" placeholder="ระบุสิ่งที่แก้ไข..."></textarea>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal('modal-close-job')" class="flex-1 py-3 text-slate-400 font-bold text-sm">ยกเลิก</button>
                    <button id="btn-confirm-save" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-bold shadow-lg">ยืนยันบันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        let store = { AllJobs: [], StaffList: [], JobTypeMaster: [], JobSubTypeMaster: [], ITTickets: [], SystemLink: [] };
        let currentUser = null;

        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) { window.location.replace("./login.html"); return; }
            currentUser = JSON.parse(session);
            document.getElementById('u-fname').innerText = currentUser.UserName;
            document.getElementById('u-type-name').innerText = currentUser.UserTypeName;
            await loadData();
        }

        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData', data: { USERID: currentUser.USERID } }) });
                const result = await res.json();
                if (result.success) {
                    store = result;
                    renderDashboard();
                    renderMyJobs();
                }
            } catch (e) { console.error(e); }
            showLoading(false);
        }

        function filterSubTypes(jobTypeName) {
            const subSelect = document.getElementById('close-subtype');
            const jobType = store.JobTypeMaster.find(t => t.JobTypeName === jobTypeName);
            if (!jobType) return;
            
            const filtered = store.JobSubTypeMaster.filter(s => s.JobTypeCode === jobType.JobTypeCode && s.Active === "TRUE");
            subSelect.innerHTML = filtered.map(s => `<option value="${s.SubTypeName}">${s.SubTypeName}</option>`).join('');
        }

        function openCloseJobForm(jobId) {
            closeModal('modal-detail');
            const typeSelect = document.getElementById('close-job-type');
            typeSelect.innerHTML = store.JobTypeMaster.filter(t => t.Active === "TRUE").map(t => `<option value="${t.JobTypeName}">${t.JobTypeName}</option>`).join('');
            
            if (store.JobTypeMaster.length > 0) {
                filterSubTypes(typeSelect.value);
            }
            
            document.getElementById('modal-close-job').style.display = 'flex';
            document.getElementById('btn-confirm-save').onclick = () => saveCloseJob(jobId);
        }

        async function saveCloseJob(jobId) {
            const data = {
                JobID: jobId,
                JobTypeName: document.getElementById('close-job-type').value,
                SubTypeName: document.getElementById('close-subtype').value,
                ServiceMA: document.getElementById('close-service-ma').value,
                JobStatus: 'เสร็จสิ้น'
            };
            showLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateJobStatus', data: { ...data, type: 'done', Owner: currentUser.USERID } }) });
                if ((await res.json()).success) { closeModal('modal-close-job'); await loadData(); }
            } catch (e) { alert("Error"); }
            showLoading(false);
        }

        function viewJobDetail(jobId) {
            const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
            if (!job) return;

            // เขียนเนื้อหา Detail กลับมาให้ครบ
            document.getElementById('detail-content').innerHTML = `
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">ปัญหาที่แจ้ง</p>
                    <p class="text-sm font-bold text-slate-700 mt-1">${job.Problem}</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-[9px] text-slate-400">หน่วยงาน</p><p class="text-xs font-bold">${job.Department}</p></div>
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-[9px] text-slate-400">ความสำคัญ</p><p class="text-xs font-bold text-pink-600">${job.Priority}</p></div>
                </div>
            `;

            // เขียนปุ่ม Action กลับมาให้ครบ
            let btns = '';
            if (job.Status === 'รอรับงาน' && currentUser.UserTypeID === 'IT') {
                btns = `<button onclick="handleStatus('${job.JobID}', 'accept')" class="w-full py-4 pink-grad text-white rounded-2xl font-bold shadow-lg">⚡ รับงานนี้</button>`;
            } else if (job.Status === 'กำลังดำเนินการ' && String(job.Owner) === String(currentUser.USERID)) {
                btns = `<button onclick="openCloseJobForm('${job.JobID}')" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold shadow-lg">✅ บันทึกปิดงาน</button>`;
            }
            document.getElementById('detail-actions').innerHTML = btns;
            document.getElementById('modal-detail').style.display = 'flex';
        }

        async function handleStatus(jobId, type) {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateJobStatus', data: { JobID: jobId, type: type, Owner: currentUser.USERID } }) });
                if ((await res.json()).success) { closeModal('modal-detail'); await loadData(); }
            } catch (e) { alert("Error"); }
            showLoading(false);
        }

        function renderDashboard() {
            const list = document.getElementById('job-list-dashboard');
            list.innerHTML = store.AllJobs.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-4 border-l-8 ${j.Status === 'เสร็จสิ้น' ? 'border-green-500' : 'border-pink-500'}">
                    <p class="text-[9px] font-bold text-slate-400">#${j.JobID}</p>
                    <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                </div>
            `).join('');
            updateStats();
        }

        function renderMyJobs() {
            const list = document.getElementById('job-list-myjob');
            const my = store.AllJobs.filter(j => String(j.Owner) === String(currentUser.USERID) && j.Status !== 'เสร็จสิ้น');
            list.innerHTML = my.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-4 border-l-8 border-blue-500">
                    <p class="text-[10px] font-bold text-blue-500">${j.Status}</p>
                    <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                </div>
            `).join('');
        }

        function updateStats() {
            const count = (s) => store.AllJobs.filter(j => j.Status === s).length;
            document.getElementById('count-wait').innerText = count('รอรับงาน');
            document.getElementById('count-doing').innerText = count('กำลังดำเนินการ');
            document.getElementById('count-done').innerText = count('เสร็จสิ้น');
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('border-pink-600', i+1===n));
        }

        function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); window.location.replace("./login.html"); }

        initApp();
    </script>
</body>
</html>
