<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT UDON HOSP - แกนหลักระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        :root {
            --primary-color: #d81b60;
            --primary-gradient: linear-gradient(135deg, #ad1457 0%, #f06292 100%);
            --bg-color: #fce4ec;
            --text-dark: #37474f;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        body { background-color: var(--bg-color); color: var(--text-dark); font-family: 'Kanit', sans-serif; }
        
        .header-pink { background: var(--primary-gradient); color: white; border-radius: 0 0 24px 24px; box-shadow: var(--shadow); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* สไตล์การ์ดที่ UX เดิมต้องการ */
        .job-card-original {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            border-left: 8px solid #ddd;
            transition: all 0.3s ease;
        }
        .status-wait { border-left-color: #f06292; }   /* ชมพู */
        .status-doing { border-left-color: #2196f3; }  /* ฟ้า */
        .status-done { border-left-color: #4caf50; }   /* เขียว */

        .btn-action {
            background: var(--primary-gradient);
            color: white; border: none; border-radius: 12px;
            padding: 12px; width: 100%; font-weight: 600; cursor: pointer;
        }
        
        /* Loader & Popup (ใช้ตาม style-login) */
        .loader-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(216, 27, 96, 0.1); border-top: 3px solid var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24 bg-slate-50">

    <div id="loader" class="loader-overlay"><div class="spinner"></div></div>

    <header class="header-pink p-6 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-full p-2 shadow-lg">
                    <img src="https://cdn-icons-png.flaticon.com/512/2906/2906274.png" alt="logo">
                </div>
                <div>
                    <h1 id="u-fname" class="text-lg font-bold">กำลังโหลด...</h1>
                    <p id="u-type-name" class="text-xs opacity-80 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="Auth.logout()" class="p-2 bg-white/20 rounded-xl hover:bg-white/30 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <section id="tab1" class="tab-content active">
            <div class="grid grid-cols-5 gap-2 mb-6">
                <div class="bg-white p-2 rounded-2xl shadow-sm text-center border">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">รอรับ</p>
                    <p class="text-lg font-black text-pink-500" id="count-wait">0</p>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-sm text-center border">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">ทำอยู่</p>
                    <p class="text-lg font-black text-blue-500" id="count-doing">0</p>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-sm text-center border">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">รออะไหล่</p>
                    <p class="text-lg font-black text-orange-500" id="count-spare">0</p>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-sm text-center border">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">เสร็จ</p>
                    <p class="text-lg font-black text-green-500" id="count-done">0</p>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-sm text-center border">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">ยกเลิก</p>
                    <p class="text-lg font-black text-slate-400" id="count-cancel">0</p>
                </div>
            </div>

            <div id="job-list-dashboard" class="space-y-4">
                <p class="text-center text-slate-400 py-10">กำลังดึงข้อมูลงานล่าสุด...</p>
            </div>
        </section>

        <section id="tab2" class="tab-content">
            <h2 class="font-bold text-slate-700 mb-4">งานที่ฉันรับผิดชอบ</h2>
            <div id="job-list-myjob" class="space-y-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around shadow-lg z-50">
        <button onclick="switchTab(1)" class="flex flex-col items-center gap-1 text-pink-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold">Dashboard</span>
        </button>
        <button onclick="switchTab(2)" class="flex flex-col items-center gap-1 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold">งานของฉัน</span>
        </button>
    </nav>

    <script src="api.js"></script>
    <script src="main.js"></script>
    
    <script>
        // 1. ตรวจสอบ Session เมื่อโหลด
        document.addEventListener('DOMContentLoaded', async () => {
            const user = Auth.getUser();
            if (!user) { window.location.replace("login.html"); return; }
            
            // แสดงข้อมูลใน Header ตาม ID ใน main.js
            document.getElementById('u-fname').innerText = (user.UserName || '') + ' ' + (user.UserSname || '');
            document.getElementById('u-type-name').innerText = user.UserType || 'Staff';

            await loadData();
        });

        // 2. ดึงข้อมูลและ Update UI
        async function loadData() {
            const user = Auth.getUser();
            Loader.show();
            const res = await ApiService.call('getInitialData', { USERID: user.USERID });
            Loader.hide();

            if (res.success) {
                renderJobs(res.AllJobs);
            }
        }

        // 3. Render การ์ดงาน (UX แกนหลัก)
        function renderJobs(jobs) {
            const container = document.getElementById('job-list-dashboard');
            container.innerHTML = '';
            
            let counts = { wait: 0, doing: 0, spare: 0, done: 0, cancel: 0 };

            jobs.forEach(job => {
                // อัปเดตตัวเลข Stats
                if (job.Status === 'รอรับงาน') counts.wait++;
                else if (job.Status === 'กำลังดำเนินการ') counts.doing++;
                else if (job.Status === 'เสร็จสิ้น') counts.done++;

                // สร้าง HTML การ์ดงาน
                const statusClass = job.Status === 'รอรับงาน' ? 'status-wait' : (job.Status === 'กำลังดำเนินการ' ? 'status-doing' : 'status-done');
                
                const card = document.createElement('div');
                card.className = `job-card-original ${statusClass}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded font-bold">#${job.JobID}</span>
                        <span class="text-[10px] font-bold uppercase ${statusClass.replace('status-', 'text-')}">${job.Status}</span>
                    </div>
                    <h3 class="font-bold text-slate-700 leading-tight mb-1">${job.Problem || 'ไม่ระบุปัญหา'}</h3>
                    <p class="text-xs text-slate-400">📍 ${job.Department || 'ไม่ทราบหน่วยงาน'}</p>
                    <div class="mt-4 flex gap-2">
                        <button class="btn-action text-xs" onclick="alert('จัดการงาน #${job.JobID}')">ดูรายละเอียด / จัดการ</button>
                    </div>
                `;
                container.appendChild(card);
            });

            // ใส่ตัวเลขกลับเข้าไปในหน้า Dashboard
            document.getElementById('count-wait').innerText = counts.wait;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
        }
    </script>
</body>
</html>
