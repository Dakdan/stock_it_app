<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...<br><span class="text-[9px] font-normal text-slate-400 italic">กรุณารอสักครู่</span></p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบจัดการงานซ่อมและบริการ กลุ่มงาน: เทคโนโลยีสารสนเทศ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p>
                    <p id="u-type-name" class="text-[9px] opacity-70"></p>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase tracking-wider">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div id="job-list-myjob" class="space-y-3"></div>
            </div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative">
            <div id="detail-alert" class="inner-alert">
                <div class="bg-pink-100 p-4 rounded-full mb-3 status-pulse"><span class="text-3xl">✅</span></div>
                <p id="detail-alert-text" class="text-pink-600 font-bold">ดำเนินการสำเร็จ</p>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                    <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
                </div>
                <div id="detail-content" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
                <div id="detail-actions" class="mt-6 flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modal-close-job" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl relative overflow-hidden">
            <div class="p-6 text-left">
                <h3 class="font-bold text-green-600 text-lg mb-4 flex items-center gap-2">
                    <span>✅</span> บันทึกรายละเอียดการปิดงาน
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">ประเภทงาน (JobTypeName)</label>
                        <select id="close-job-type" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none focus:border-green-500" onchange="filterSubTypes(this.value)"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">งานย่อย (SubTypeName)</label>
                        <select id="close-subtype" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none focus:border-green-500"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">รายละเอียดการแก้ไข/หมายเหตุ</label>
                        <textarea id="close-job-note" class="w-full p-3 bg-slate-50 rounded-xl text-sm h-24 border border-slate-100 focus:border-green-500 outline-none" placeholder="ระบุสิ่งที่แก้ไข..."></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="closeModal('modal-close-job')" class="flex-1 py-3 text-slate-400 font-bold text-sm">ยกเลิก</button>
                        <button id="btn-confirm-close" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-bold shadow-lg">ยืนยันการปิดงาน</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

   <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
    let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], JobTypeMaster: [], BackupData: [], JobSubTypeMaster: [], };
    let currentUser = null;
    let currentTab = 1; 

    async function initApp() {
        const session = localStorage.getItem("it_session");
        if (!session) { window.location.replace("./login.html"); return; }
        currentUser = JSON.parse(session);
        document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
        document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "Staff";
        await loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'getInitialData', 
                    data: { userName: currentUser.UserName, USERID: currentUser.USERID } 
                }) 
            });
            const result = await res.json();
            if (result.success) {
                store = result;
                renderDashboard();
                renderMyJobs();
                renderITTicketList();
                renderSystemLinks();
            }
        } catch (e) { console.error("Data error", e); }
        showLoading(false);
    }

    // --- ส่วนที่เพิ่ม: กรองงานย่อย (ไม่กระทบของเดิม) ---
    function filterSubTypes(jobTypeName) {
        const subSelect = document.getElementById('close-subtype');
        if (!subSelect) return;
        const jobTypeObj = (store.JobTypeMaster || []).find(t => t.JobTypeName === jobTypeName);
        if (!jobTypeObj) {
            subSelect.innerHTML = '<option value="">-- ไม่พบข้อมูล --</option>';
            return;
        }
        const filtered = (store.JobSubTypeMaster || []).filter(s => 
            String(s.JobTypeCode) === String(jobTypeObj.JobTypeCode) && 
            (s.Active === "TRUE" || s.Active === true)
        );
        subSelect.innerHTML = filtered.map(s => `<option value="${s.SubTypeName}">${s.SubTypeName}</option>`).join('');
    }

    function getStatusColor(status) {
        const s = String(status || '').trim();
        if (s === 'รอรับงาน') return "text-pink-600 bg-pink-50 border border-pink-200";
        if (s === 'กำลังดำเนินการ') return "text-blue-600 bg-blue-50 border border-blue-200";
        if (s === 'รออะไหล่') return "text-orange-600 bg-orange-50 border border-orange-200";
        if (s === 'เสร็จสิ้น') return "text-green-600 bg-green-50 border border-green-200";
        if (s === 'ยกเลิก') return "text-slate-400 bg-slate-50 border border-slate-200";
        return "text-slate-500 bg-slate-100 border border-slate-200";
    }

    function renderDashboard() {
        const jobs = store.AllJobs || [];
        updateStats(jobs);
        
        document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => {
            const status = String(j.Status || '').trim();
            const staff = (store.StaffList || []).find(s => String(s.id).trim() === String(j.Owner).trim());
            const ownerName = staff ? staff.name : (j.Owner && j.Owner !== "-" ? j.Owner : "ยังไม่มีผู้ดูแล");

            let shadowClass = "shadow-sm";
            let borderClass = "border-slate-200";
            if (status === 'รอรับงาน') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(219,39,119,0.35)]";
                borderClass = "border-pink-500 status-pulse";
            } else if (status === 'กำลังดำเนินการ') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(59,130,246,0.3)]";
                borderClass = "border-blue-500";
            } else if (status === 'รออะไหล่') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(251,146,60,0.3)]";
                borderClass = "border-orange-400";
            } else if (status === 'เสร็จสิ้น') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(34,197,94,0.2)]";
                borderClass = "border-green-500";
            }

            const assetInfo = (store.BackupData || []).find(a => String(a.NOID) === String(j.AssetCode));
            let assetBoxHTML = "";
            if (j.AssetCode && j.AssetCode !== "" && j.AssetCode !== "-") {
                const displayID = assetInfo ? assetInfo.AssetID : j.AssetCode;
                assetBoxHTML = `
                    <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 mt-2">
                        <p class="text-[9px] text-slate-500 font-bold uppercase">📦 ครุภัณฑ์: ${displayID}</p>
                    </div>`;
            }

            return `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${borderClass} ${shadowClass} mb-4 transition-all duration-300">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400">#${j.JobID}</span>
                            <span class="text-[9px] text-slate-400 ml-2">📅 ${j.CreateDate || ''}</span>
                        </div>
                        <span class="text-[10px] font-black uppercase px-2.5 py-1 rounded-lg ${getStatusColor(status)}">
                            ${status}
                        </span>
                    </div>
                    <div class="space-y-2">
                        <div>
                            <p class="text-[10px] font-bold text-pink-500 uppercase">${j.JobType || ''}</p>
                            <h3 class="font-bold text-slate-700 text-sm leading-snug">${j.Problem}</h3>
                        </div>
                        ${assetBoxHTML}
                        <div class="flex justify-between items-end pt-2 border-t border-slate-50 mt-2">
                            <div class="space-y-1">
                                <p class="text-[8px] text-slate-400 uppercase font-bold">ผู้ดูแลงาน</p>
                                <p class="text-[10px] font-bold text-blue-600 italic leading-tight">👤 ${ownerName}</p>
                            </div>
                            <div class="text-right space-y-1">
                                <p class="text-[9px] font-bold text-slate-500">🏢 ${j.Department}</p>
                                <p class="text-[10px] font-bold ${String(j.Priority).includes('ด่วน') ? 'text-red-500' : 'text-orange-500'}">
                                    ⚠️ ${j.Priority}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderMyJobs() {
        const myJobs = (store.AllJobs || []).filter(j => 
            String(j.Owner).trim() === String(currentUser.USERID).trim() && 
            String(j.Status).trim() === 'กำลังดำเนินการ'
        );
        const container = document.getElementById('job-list-myjob');
        if (myJobs.length > 0) {
            container.innerHTML = myJobs.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 border-blue-500 mb-3 shadow-[0_8px_15px_-3px_rgba(59,130,246,0.2)]">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold">${j.JobID}</p>
                            <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                            <p class="text-[9px] text-blue-500 mt-1 font-bold">📍 ${j.Department}</p>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${getStatusColor(j.Status)} uppercase">
                            ${j.Status}
                        </span>
                    </div>
                </div>`).join('');
        } else {
            container.innerHTML = '<div class="p-8 text-center opacity-40 italic text-xs bg-white rounded-2xl border-dashed border border-slate-200">ไม่มีงานที่กำลังดำเนินการของคุณ</div>';
        }
    }

    async function handleJobUI(jobId, type, extra = {}) {
        closeModal('modal-detail');
        closeModal('modal-transfer');
        closeModal('modal-close-job');
        showLoading(true);

        const data = { 
            JobID: jobId, 
            type: type, 
            Owner: currentUser.USERID, 
            By: currentUser.UserName, 
            ...extra 
        }; 

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'updateJobStatus', data: data }) 
            });
            const result = await res.json();
            if (result.success) { 
                showLoading(false);
                document.getElementById('success-text').innerText = "ดำเนินการสำเร็จ!";
                document.getElementById('modal-success').style.display = 'flex';
                await loadData(); 
                setTimeout(() => { closeModal('modal-success'); }, 1500);
            } else {
                showLoading(false);
                alert("ผิดพลาด: " + result.message);
            }
        } catch (e) { 
            showLoading(false);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); 
        }
    }

    function viewJobDetail(jobId) {
        const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
        if (!job) return;
        const status = String(job.JobStatus || job.Status || 'รอรับงาน').trim();
        const isOwner = String(job.Owner).trim() === String(currentUser.USERID).trim();

        document.getElementById('detail-content').innerHTML = `
            <div class="bg-pink-50 p-4 rounded-2xl border border-pink-100"><p class="font-bold text-slate-800">${job.Problem}</p></div>
            <div class="grid grid-cols-2 gap-4 text-[11px]">
                <div><p class="text-slate-400 font-bold uppercase">หน่วยงาน</p><p>${job.Department}</p></div>
                <div><p class="text-slate-400 font-bold uppercase">ความสำคัญ</p><p class="text-pink-600">${job.Priority}</p></div>
            </div>`;

        let btns = '';
        if (status === 'รอรับงาน' && currentUser.UserTypeID === 'IT') {
            btns = `<button onclick="handleJobUI('${job.JobID}', 'accept')" class="w-full py-4 pink-grad text-white rounded-2xl font-bold">⚡ รับงาน</button>`;
        } else if (isOwner && ['กำลังดำเนินการ', 'รออะไหล่'].includes(status)) {
            btns = `<button onclick="openCloseJobForm('${job.JobID}')" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold">✅ ปิดงาน / บันทึกการซ่อม</button>`;
        }
        document.getElementById('detail-actions').innerHTML = btns + `<button onclick="closeModal('modal-detail')" class="w-full py-3 text-slate-400 font-bold text-[10px]">ยกเลิก</button>`;
        document.getElementById('modal-detail').style.display = 'flex';
    }

    function openITTicketForm() {
        document.getElementById('it-job-type').innerHTML = (store.JobTypeMaster || []).map(t => `<option value="${t}">${t}</option>`).join('');
        document.getElementById('it-dept').innerHTML = (store.DeptList || []).map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('modal-it-ticket').style.display = 'flex';
    }

    function getStatusColor(s) {
        if (s === 'รอรับงาน') return "text-pink-600 bg-pink-50 border border-pink-200";
        if (s === 'เสร็จสิ้น') return "text-green-600 bg-green-50 border border-green-200";
        return "text-blue-600 bg-blue-50 border border-blue-200";
    }

    function getStatusBorder(s) { return s === 'รอรับงาน' ? 'border-pink-500 status-pulse' : 'border-blue-500'; }

    function switchTab(n) {
        currentTab = n;
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('border-pink-600', i+1 === n));
    }

    function updateStats(jobs) {
        const getC = (s) => jobs.filter(j => (j.JobStatus || j.Status) === s).length;
        document.getElementById('count-wait').innerText = getC('รอรับงาน');
        document.getElementById('count-doing').innerText = getC('กำลังดำเนินการ');
        document.getElementById('count-done').innerText = getC('เสร็จสิ้น');
    }

    function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function logout() { localStorage.clear(); window.location.replace("./login.html"); }

    document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
