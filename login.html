<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...<br><span class="text-[9px] font-normal text-slate-400 italic">กรุณารอสักครู่</span></p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบจัดการงานซ่อมและบริการ กลุ่มงาน: เทคโนโลยีสารสนเทศ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p>
                    <p id="u-type-name" class="text-[9px] opacity-70"></p>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase tracking-wider">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border-l-4 border-pink-500">
                <h2 class="text-pink-600 font-bold text-sm">งานที่รับผิดชอบ (กำลังทำ)</h2>
            </div>
            <div id="job-list-myjob" class="space-y-3"></div>
            <hr class="border-pink-100 my-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-blue-600 font-bold text-sm border-l-4 border-blue-500 pl-2 uppercase tracking-wide">IT Ticket (บันทึกงานอื่นๆ)</h2>
                <button onclick="openITTicketForm()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md hover:scale-105 transition-all">+ บันทึกงาน</button>
            </div>
            <div id="it-ticket-list" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative">
            <div id="detail-alert" class="inner-alert">
                <div class="bg-pink-100 p-4 rounded-full mb-3 status-pulse"><span class="text-3xl">✅</span></div>
                <p id="detail-alert-text" class="text-pink-600 font-bold">ดำเนินการสำเร็จ</p>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                    <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
                </div>
                <div id="detail-content" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
                <div id="detail-actions" class="mt-6 flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modal-close-job" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl relative overflow-hidden">
            <div class="p-6">
                <h3 class="font-bold text-green-600 text-lg mb-4 flex items-center gap-2"><span>✅</span> บันทึกรายละเอียดการปิดงาน</h3>
                <div class="space-y-4 max-h-[70vh] overflow-y-auto px-1 text-left">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">ประเภทงาน (JobTypeName)</label>
                        <select id="close-job-type" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">งานย่อย (SubTypeName)</label>
                        <select id="close-subtype" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none">
                            <option value="">-- กรุณาเลือกประเภทงานก่อน --</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">สถานะ (JobStatus)</label>
                        <select id="close-job-status" class="w-full p-2 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none">
                            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                            <option value="รออะไหล่">รออะไหล่</option>
                            <option value="ยกเลิก">ยกเลิก</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">รายละเอียดการแก้ไข (ServiceMA)</label>
                        <textarea id="close-job-note" class="w-full p-3 bg-slate-50 rounded-xl text-sm h-24 border border-slate-100 focus:border-green-500 outline-none" placeholder="ระบุสิ่งที่แก้ไข..."></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">หมายเหตุ (Comment)</label>
                        <input type="text" id="close-comment" class="w-full p-3 bg-slate-50 rounded-xl text-sm border border-slate-100 outline-none" placeholder="ระบุหมายเหตุเพิ่มเติม">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">แนบรูปภาพ (Jobeimag)</label>
                        <input type="file" id="close-image" accept="image/*" class="w-full text-xs">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="closeModal('modal-close-job')" class="flex-1 py-3 text-slate-400 font-bold text-sm">ยกเลิก</button>
                        <button id="btn-confirm-close" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-bold shadow-lg">ยืนยันการบันทึก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-it-ticket" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl relative overflow-hidden">
            <form id="form-it-ticket" class="p-6 space-y-4 text-left">
                <h3 class="font-bold text-blue-600 text-lg mb-4">บันทึกงาน IT Ticket</h3>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">ประเภทงาน</label>
                    <select id="it-job-type" class="w-full p-3 bg-slate-50 rounded-xl text-sm" required></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">รายละเอียดงาน</label>
                    <textarea id="it-problem" class="w-full p-3 bg-slate-50 rounded-xl text-sm h-24" placeholder="ระบุรายละเอียด..." required></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">หน่วยงาน</label>
                    <select id="it-dept" class="w-full p-3 bg-slate-50 rounded-xl text-sm" required></select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal('modal-it-ticket')" class="flex-1 py-3 text-slate-400 font-bold text-sm">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
    let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], JobTypeMaster: [], BackupData: [], JobSubTypeMaster: [], };
    let currentUser = null;
    let currentTab = 1;

    async function initApp() {
        const session = localStorage.getItem("it_session");
        if (!session) { window.location.replace("./login.html"); return; }
        currentUser = JSON.parse(session);
        document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
        document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "";
        await loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'getInitialData', data: { userName: currentUser.UserName, USERID: currentUser.USERID } }) 
            });
            const result = await res.json();
            if (result.success) {
                store = result;
                renderDashboard();
                renderMyJobs();
                renderITTicketList();
                renderSystemLinks();
            }
        } catch (e) { console.error("Data error", e); }
        showLoading(false);
    }

    function switchTab(n) {
        currentTab = n;
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        document.querySelectorAll('nav button').forEach((btn, i) => {
            if (i + 1 === n) {
                btn.classList.add('border-pink-600', 'text-pink-600');
                btn.classList.remove('border-transparent', 'text-slate-400');
            } else {
                btn.classList.remove('border-pink-600', 'text-pink-600');
                btn.classList.add('border-transparent', 'text-slate-400');
            }
        });
    }

    function renderDashboard() {
        const jobs = store.AllJobs || [];
        updateStats(jobs);
        const list = document.getElementById('job-list-dashboard');
        list.innerHTML = jobs.map(j => {
            const status = String(j.JobStatus || j.Status || 'รอรับงาน').trim();
            let border = 'border-pink-500 status-pulse';
            if (status === 'กำลังดำเนินการ') border = 'border-blue-500';
            if (status === 'เสร็จสิ้น') border = 'border-green-500';
            return `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${border} mb-3">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-slate-400">#${j.JobID}</span>
                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded-lg ${getStatusStyle(status)}">${status}</span>
                    </div>
                    <h3 class="font-bold text-slate-700 text-sm mb-2">${j.Problem}</h3>
                    <div class="flex justify-between items-center text-[10px] text-slate-400">
                        <span>🏢 ${j.Department}</span>
                        <span class="font-bold text-pink-500">${j.Priority}</span>
                    </div>
                </div>`;
        }).join('');
    }

    function renderMyJobs() {
        const jobs = (store.AllJobs || []).filter(j => 
            String(j.Owner).trim() === String(currentUser.USERID).trim() && 
            ['กำลังดำเนินการ', 'รออะไหล่'].includes(String(j.JobStatus || j.Status).trim())
        );
        const list = document.getElementById('job-list-myjob');
        if (jobs.length === 0) { list.innerHTML = '<p class="text-center text-slate-400 text-xs py-10">ไม่มีงานที่กำลังดำเนินการ</p>'; return; }
        list.innerHTML = jobs.map(j => `
            <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-4 border-l-8 border-blue-500">
                <div class="flex justify-between items-center">
                    <div><p class="text-[9px] font-bold text-slate-400">#${j.JobID}</p><h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3></div>
                    <span class="text-[9px] font-black uppercase px-2 py-1 rounded-lg bg-blue-50 text-blue-600 border border-blue-100">${j.JobStatus || j.Status}</span>
                </div>
            </div>`).join('');
    }

    // ฟังก์ชันใหม่: กรองงานย่อยตามประเภทงาน
    function updateSubTypeOptions(selectedJobTypeName) {
        const subTypeSelect = document.getElementById('close-subtype');
        const jobTypeObj = (store.JobTypeMaster || []).find(t => t.JobTypeName === selectedJobTypeName);
        const jobTypeCode = jobTypeObj ? jobTypeObj.JobTypeCode : null;

        if (!jobTypeCode) {
            subTypeSelect.innerHTML = '<option value="">-- ไม่พบข้อมูลงานย่อย --</option>';
            return;
        }

        const filteredSubTypes = (store.JobSubTypeMaster || []).filter(s => s.JobTypeCode === jobTypeCode && (s.Active === "TRUE" || s.Active === true));
        subTypeSelect.innerHTML = filteredSubTypes.map(s => `<option value="${s.SubTypeName}">${s.SubTypeName}</option>`).join('');
    }

    function openCloseJobForm(jobId) {
        closeModal('modal-detail');
        const typeSelect = document.getElementById('close-job-type');
        
        // โหลด JobType (เฉพาะที่ Active)
        const activeTypes = (store.JobTypeMaster || []).filter(t => t.Active === "TRUE" || t.Active === true);
        typeSelect.innerHTML = activeTypes.map(t => `<option value="${t.JobTypeName}">${t.JobTypeName}</option>`).join('');

        // Event เมื่อเปลี่ยนประเภทงาน
        typeSelect.onchange = (e) => updateSubTypeOptions(e.target.value);
        
        // โหลดค่าเริ่มต้น
        if (activeTypes.length > 0) updateSubTypeOptions(activeTypes[0].JobTypeName);

        document.getElementById('modal-close-job').style.display = 'flex';
        
        document.getElementById('btn-confirm-close').onclick = async () => {
            const note = document.getElementById('close-job-note').value;
            if (!note) { alert('กรุณาระบุรายละเอียดการแก้ไข'); return; }

            const fileInput = document.getElementById('close-image');
            let base64 = "";
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                base64 = await new Promise(r => reader.onload = () => r(reader.result));
            }

            handleJobUI(jobId, 'done', {
                JobTypeName: typeSelect.value,
                SubTypeName: document.getElementById('close-subtype').value,
                JobStatus: document.getElementById('close-job-status').value,
                ServiceMA: note,
                Comment: document.getElementById('close-comment').value,
                Jobeimag: base64
            });
        };
    }

    async function handleJobUI(jobId, type, extra = {}) {
        closeModal('modal-detail');
        closeModal('modal-close-job');
        showLoading(true);
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'updateJobStatus', data: { JobID: jobId, type: type, Owner: currentUser.USERID, ...extra } }) 
            });
            const result = await res.json();
            if (result.success) { await loadData(); }
        } catch (e) { alert('Error Connecting to Server'); }
        showLoading(false);
    }

    function viewJobDetail(jobId) {
        const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
        if (!job) return;
        const status = String(job.JobStatus || job.Status || 'รอรับงาน').trim();
        const content = document.getElementById('detail-content');
        const actions = document.getElementById('detail-actions');

        content.innerHTML = `<div class="bg-slate-50 p-4 rounded-2xl"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">ปัญหาที่แจ้ง</p><p class="text-sm text-slate-700 font-bold">${job.Problem}</p></div>
            <div class="grid grid-cols-2 gap-3 text-xs"><div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400 mb-1">หน่วยงาน</p><p class="font-bold">${job.Department}</p></div><div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400 mb-1">ความสำคัญ</p><p class="font-bold text-pink-600">${job.Priority}</p></div></div>`;

        let btns = '';
        if (status === 'รอรับงาน' && currentUser.UserTypeID === 'IT') {
            btns = `<button onclick="handleJobUI('${job.JobID}', 'accept')" class="w-full py-4 pink-grad text-white rounded-2xl font-bold shadow-lg">⚡ รับงานนี้</button>`;
        } else if (String(job.Owner).trim() === String(currentUser.USERID).trim() && status === 'กำลังดำเนินการ') {
            btns = `<button onclick="openCloseJobForm('${job.JobID}')" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold shadow-lg">✅ บันทึกการซ่อม/ปิดงาน</button>`;
        }
        actions.innerHTML = btns;
        document.getElementById('modal-detail').style.display = 'flex';
    }

    function openITTicketForm() {
        document.getElementById('it-job-type').innerHTML = (store.JobTypeMaster || []).map(t => `<option value="${t.JobTypeName}">${t.JobTypeName}</option>`).join('');
        document.getElementById('it-dept').innerHTML = (store.DeptList || []).map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('modal-it-ticket').style.display = 'flex';
    }

    document.getElementById('form-it-ticket').onsubmit = async (e) => {
        e.preventDefault();
        showLoading(true);
        const data = { jobType: document.getElementById('it-job-type').value, problem: document.getElementById('it-problem').value, dept: document.getElementById('it-dept').value, owner: currentUser.USERID };
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveITTicket', data: data }) });
            if ((await res.json()).success) { await loadData(); closeModal('modal-it-ticket'); }
        } catch (e) { alert('Error Saving IT Ticket'); }
        showLoading(false);
    };

    function renderITTicketList() {
        document.getElementById('it-ticket-list').innerHTML = (store.ITTickets || []).map(it => `<div class="bg-white p-3 rounded-2xl border border-blue-50"><p class="text-[8px] font-bold text-blue-400 uppercase">${it.JobType}</p><p class="text-xs font-bold text-slate-600">${it.Problem}</p></div>`).join('');
    }

    function renderSystemLinks() {
        document.getElementById('tab3').innerHTML = (store.SystemLink || []).filter(l => String(l.Active).toLowerCase() === 'true').map(l => `<a href="${l.URL}" target="_blank" class="card-pro p-4 flex items-center gap-4"><div class="text-2xl">${l.Linkicon || '🔗'}</div><div><p class="font-bold text-slate-700 text-sm">${l.Name}</p></div></a>`).join('');
    }

    function updateStats(jobs) {
        const count = (s) => jobs.filter(j => String(j.JobStatus || j.Status).trim() === s).length;
        document.getElementById('count-wait').innerText = count('รอรับงาน');
        document.getElementById('count-doing').innerText = count('กำลังดำเนินการ');
        document.getElementById('count-spare').innerText = count('รออะไหล่');
        document.getElementById('count-done').innerText = count('เสร็จสิ้น');
        document.getElementById('count-cancel').innerText = count('ยกเลิก');
    }

    function getStatusStyle(s) {
        if (s === 'รอรับงาน') return 'bg-pink-50 text-pink-600 border border-pink-100';
        if (s === 'เสร็จสิ้น') return 'bg-green-50 text-green-600 border border-green-100';
        return 'bg-blue-50 text-blue-600 border border-blue-100';
    }

    function logout() { localStorage.clear(); window.location.replace("./login.html"); }
    function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    initApp();
    </script>
</body>
</html>
