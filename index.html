<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Service And Maintenance - รพ.อุดรธานี</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Kanit',sans-serif;background:#fdf2f8;min-height:100vh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body class="pb-10">

<div id="loader" class="overlay">
<div class="bg-white p-6 rounded-3xl shadow-xl">กำลังโหลด...</div>
</div>

<header class="bg-pink-600 text-white p-4 flex justify-between">
<div>
<h1 class="font-bold">รพ.อุดรธานี (ITSM)</h1>
<p id="u-fname" class="text-xs"></p>
</div>
<button onclick="logout()">🚪</button>
</header>

<main class="max-w-4xl mx-auto p-4 space-y-6">

<div class="flex justify-between items-center">
<h2 class="text-blue-600 font-bold text-sm">IT Ticket</h2>
<button onclick="openITTicketForm()" class="bg-blue-600 text-white px-4 py-1 rounded text-xs">+ บันทึกงาน</button>
</div>

<div id="it-ticket-list"></div>

</main>

<!-- Modal IT Ticket -->
<div id="modal-it-ticket" class="overlay">
<div class="bg-white p-6 rounded-2xl w-full max-w-md">
<form id="form-it-ticket" class="space-y-4">
<h3 class="font-bold text-blue-600">บันทึกงาน IT Ticket</h3>

<select id="it-job-type" class="w-full p-2 border rounded" required></select>

<textarea id="it-problem" class="w-full p-2 border rounded" placeholder="รายละเอียด" required></textarea>

<select id="it-dept" class="w-full p-2 border rounded" required></select>

<div class="flex gap-2">
<button type="button" onclick="closeModal('modal-it-ticket')" class="flex-1 border p-2">ยกเลิก</button>
<button type="submit" class="flex-1 bg-blue-600 text-white p-2">บันทึก</button>
</div>

</form>
</div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';

let store={ITTickets:[],DeptList:[],JobTypeMaster:[]};
let currentUser=null;

document.addEventListener('DOMContentLoaded',initApp);

async function initApp(){
const session=localStorage.getItem("it_session");
if(!session){alert("ยังไม่ได้ login");return;}
currentUser=JSON.parse(session);
document.getElementById('u-fname').innerText=currentUser.UserName||"";
await loadData();
bindForm();
}

async function loadData(){
showLoading(true);
try{
const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'getInitialData'})});
const result=await res.json();
if(result.success){
store=result;
renderITTicketList();
}
}catch(e){console.error(e);}
showLoading(false);
}

function bindForm(){
const form=document.getElementById('form-it-ticket');
form.addEventListener('submit',async e=>{
e.preventDefault();
showLoading(true);

const data={
action:'saveITTicket',
data:{
jobType:document.getElementById('it-job-type').value,
problem:document.getElementById('it-problem').value,
dept:document.getElementById('it-dept').value,
owner:currentUser?.USERID||''
}
};

try{
const res=await fetch(API_URL,{method:'POST',body:JSON.stringify(data)});
const result=await res.json();
if(result.success){
closeModal('modal-it-ticket');
form.reset();
await loadData();
}
}catch(err){alert("Error");}

showLoading(false);
});
}

function openITTicketForm(){

const jobSelect=document.getElementById('it-job-type');
jobSelect.innerHTML=(store.JobTypeMaster||[]).map(t=>{
if(typeof t==='string')return `<option>${t}</option>`;
return `<option>${t.JobTypeName||''}</option>`;
}).join('');

const deptSelect=document.getElementById('it-dept');
deptSelect.innerHTML=(store.DeptList||[]).map(d=>{
if(typeof d==='string')return `<option>${d}</option>`;
return `<option>${d.DepartmentName||d.DeptName||''}</option>`;
}).join('');

document.getElementById('modal-it-ticket').style.display='flex';
}

function renderITTicketList(){
const list=store.ITTickets||[];
const box=document.getElementById('it-ticket-list');
if(list.length===0){
box.innerHTML='<div class="text-slate-400 text-xs">ไม่พบข้อมูล</div>';
return;
}
box.innerHTML=list.map(it=>`
<div class="bg-white p-3 rounded shadow mb-2">
<div class="font-bold text-sm">${it.Problem||'-'}</div>
<div class="text-xs text-slate-500">${it.Department||'-'}</div>
</div>
`).join('');
}

function closeModal(id){
document.getElementById(id).style.display='none';
}

function logout(){
localStorage.clear();
location.reload();
}

function showLoading(v){
document.getElementById('loader').style.display=v?'flex':'none';
}
</script>

</body>
</html>
