<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .pink-grad { background: linear-gradient(135deg, #ec4899, #db2777); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">

    <header class="p-5 bg-white shadow-sm sticky top-0 z-40">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h1 id="u-fname" class="text-lg font-bold text-slate-800 uppercase italic leading-none">Loading...</h1>
                <p id="u-type-name" class="text-[10px] text-pink-500 font-black uppercase tracking-widest mt-1"></p>
            </div>
            <button onclick="logout()" class="text-[10px] font-bold text-slate-400 border border-slate-200 px-3 py-1 rounded-lg uppercase">Logout 🚪</button>
        </div>
        <button onclick="openITTicketForm()" class="w-full pink-grad text-white py-3 rounded-2xl text-xs font-bold shadow-lg active:scale-95 transition-all">
            + แจ้งซ่อมใหม่ (IT TICKET)
        </button>
    </header>

    <main class="p-4">
        <div class="grid grid-cols-5 gap-2 mb-6 text-center">
            <div class="bg-white p-2 rounded-xl shadow-sm border border-pink-100"><p id="count-wait" class="font-bold text-pink-600 text-lg">0</p><p class="text-[8px] text-slate-400 font-bold uppercase">รอรับงาน</p></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-blue-100"><p id="count-doing" class="font-bold text-blue-600 text-lg">0</p><p class="text-[8px] text-slate-400 font-bold uppercase">กำลังทำ</p></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-orange-100"><p id="count-spare" class="font-bold text-orange-600 text-lg">0</p><p class="text-[8px] text-slate-400 font-bold uppercase">รออะไหล่</p></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-green-100"><p id="count-done" class="font-bold text-green-600 text-lg">0</p><p class="text-[8px] text-slate-400 font-bold uppercase">สำเร็จ</p></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-100"><p id="count-cancel" class="font-bold text-slate-400 text-lg">0</p><p class="text-[8px] text-slate-400 font-bold uppercase">ยกเลิก</p></div>
        </div>
        
        <div id="job-list-dashboard" class="space-y-4"></div>
    </main>

    <div id="modal-it-ticket" class="modal-overlay">
        <form id="form-it-ticket" class="bg-white w-full max-w-md rounded-[32px] p-6 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-5 italic">📝 แจ้งซ่อมใหม่</h3>
            <div class="space-y-4">
                <select id="it-job-type" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-500 font-semibold text-slate-700" required></select>
                <select id="it-job-subtype" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-500 font-semibold text-slate-700" required></select>
                <select id="it-dept" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-500 font-semibold text-slate-700" required></select>
                <textarea id="it-problem" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-500 font-semibold text-slate-700" rows="3" placeholder="ระบุอาการเสีย..." required></textarea>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-2 py-4 px-8 pink-grad text-white rounded-2xl font-bold shadow-lg">บันทึกส่งงาน</button>
                    <button type="button" onclick="closeModal('modal-it-ticket')" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">ยกเลิก</button>
                </div>
            </div>
        </form>
    </div>

    <div id="loader" class="modal-overlay !bg-white/80 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-pink-200 border-t-pink-600 rounded-full animate-spin"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        let store = { AllJobs: [], JobTypeMaster: [], JobSubTypeMaster: [], DeptList: [] };
        let currentUser = null;

        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) { window.location.replace("./login.html"); return; }
            currentUser = JSON.parse(session);
            document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
            document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "Staff";
            await loadData();
        }

        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getInitialData', data: { USERID: currentUser.USERID } }) 
                });
                const result = await res.json();
                if (result.success) {
                    store = result;
                    renderDashboard();
                }
            } catch (e) { console.error(e); }
            showLoading(false);
        }

        function renderDashboard() {
            const jobs = store.AllJobs || [];
            updateStats(jobs);
            document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => `
                <div class="bg-white p-5 border-l-8 border-pink-500 rounded-2xl shadow-sm mb-4">
                    <p class="text-[10px] font-bold text-slate-400 italic mb-1">#${j.JobID}</p>
                    <h3 class="font-bold text-slate-700 text-sm mb-2">${j.Problem}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded-lg bg-pink-50 text-pink-600">${j.Status}</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase italic">${j.Department}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(jobs) {
            const getCount = (s) => jobs.filter(j => String(j.Status).trim() === s).length;
            document.getElementById('count-wait').innerText = getCount('รอรับงาน');
            document.getElementById('count-doing').innerText = getCount('กำลังดำเนินการ');
            document.getElementById('count-spare').innerText = getCount('รออะไหล่');
            document.getElementById('count-done').innerText = getCount('เสร็จสิ้น');
            document.getElementById('count-cancel').innerText = getCount('ยกเลิก');
        }

        function openITTicketForm() {
            const typeSelect = document.getElementById('it-job-type');
            const subSelect = document.getElementById('it-job-subtype');
            typeSelect.innerHTML = (store.JobTypeMaster || []).map(t => `<option value="${t.JobTypeName}">${t.JobTypeName}</option>`).join('');
            document.getElementById('it-dept').innerHTML = (store.DeptList || []).map(d => `<option value="${d}">${d}</option>`).join('');

            const updateSub = () => {
                const typeObj = (store.JobTypeMaster || []).find(t => t.JobTypeName === typeSelect.value);
                const code = typeObj ? typeObj.JobTypeCode : '';
                const filtered = (store.JobSubTypeMaster || []).filter(s => String(s.JobTypeCode) === String(code));
                subSelect.innerHTML = filtered.length > 0 ? filtered.map(s => `<option value="${s.SubTypeName}">${s.SubTypeName}</option>`).join('') : '<option value="">--</option>';
            };
            typeSelect.onchange = updateSub;
            updateSub();
            document.getElementById('modal-it-ticket').style.display = 'flex';
        }

        document.getElementById('form-it-ticket').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                jobType: document.getElementById('it-job-type').value,
                problem: document.getElementById('it-problem').value,
                dept: document.getElementById('it-dept').value,
                owner: currentUser.USERID 
            };
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'saveITTicket', data: payload }) 
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('form-it-ticket').reset();
                    closeModal('modal-it-ticket');
                    await loadData();
                }
            } catch (e) { alert("บันทึกไม่สำเร็จ"); }
            showLoading(false);
        };

        function logout() {
            localStorage.clear();
            window.location.replace("./login.html");
        }

        function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
