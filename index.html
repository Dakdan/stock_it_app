<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT UDON HOSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .pink-header { background: linear-gradient(135deg, #ad1457 0%, #f06292 100%); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #d81b60 !important; }
        
        /* สไตล์การ์ดงาน */
        .job-card {
            background: white; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-left: 6px solid #e2e8f0;
        }
        .status-wait { border-left-color: #f06292; }
        .status-doing { border-left-color: #3b82f6; }
        .status-spare { border-left-color: #f59e0b; }
        .status-done { border-left-color: #22c55e; }
        
        /* สไตล์ Stats Card ตามรูป */
        .stat-box { background: white; border-radius: 12px; padding: 8px; text-align: center; border: 1px solid #f1f5f9; min-width: 60px; }
    </style>
</head>
<body class="pb-24">

    <div id="loader" class="fixed inset-0 bg-white/80 z-[100] hidden flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <header class="pink-header p-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md">
                    <span class="text-2xl">💾</span>
                </div>
                <div>
                    <h1 id="u-fname" class="font-bold text-lg">กำลังโหลด...</h1>
                    <p id="u-type-name" class="text-[10px] opacity-80 font-bold uppercase tracking-widest">IT STAFF</p>
                </div>
            </div>
            <button onclick="Auth.logout()" class="p-2 bg-white/20 rounded-xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="flex justify-between gap-1 mb-6 overflow-x-auto pb-2">
            <div class="stat-box">
                <p class="text-[8px] font-bold text-slate-400">รอรับ</p>
                <p id="count-wait" class="text-lg font-black text-pink-500">0</p>
            </div>
            <div class="stat-box">
                <p class="text-[8px] font-bold text-slate-400">ทำอยู่</p>
                <p id="count-doing" class="text-lg font-black text-blue-500">0</p>
            </div>
            <div class="stat-box">
                <p class="text-[8px] font-bold text-slate-400">รออะไหล่</p>
                <p id="count-spare" class="text-lg font-black text-orange-500">0</p>
            </div>
            <div class="stat-box">
                <p class="text-[8px] font-bold text-slate-400">เสร็จ</p>
                <p id="count-done" class="text-lg font-black text-green-500">0</p>
            </div>
            <div class="stat-box">
                <p class="text-[8px] font-bold text-slate-400">ยกเลิก</p>
                <p id="count-cancel" class="text-lg font-black text-slate-400">0</p>
            </div>
        </div>

        <div id="tab1" class="tab-content active">
            <div id="job-list-dashboard" class="space-y-3">
                <p class="text-center text-slate-400 text-sm mt-10">กำลังดึงข้อมูลงานล่าสุด...</p>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="job-list-myjob" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <button onclick="switchTab(1)" id="btn-tab1" class="flex flex-col items-center gap-1 nav-active transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold">Dashboard</span>
        </button>
        <button onclick="switchTab(2)" id="btn-tab2" class="flex flex-col items-center gap-1 text-slate-400 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
            <span class="text-[10px] font-bold uppercase">งานของฉัน</span>
        </button>
    </nav>

    <script src="api.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = Auth.getUser();
            if (!user) { window.location.replace("login.html"); return; }
            
            // แก้ไขปัญหาชื่อไม่แสดง
            document.getElementById('u-fname').innerText = user.UserName + " " + user.UserSname;
            document.getElementById('u-type-name').innerText = user.UserType;

            await loadJobs();
        });

        async function loadJobs() {
            Loader.show();
            const user = Auth.getUser();
            const res = await ApiService.call('getInitialData', { USERID: user.USERID });
            Loader.hide();

            if (res.success) {
                renderJobs(res.AllJobs);
            }
        }

        function renderJobs(jobs) {
            const dashboard = document.getElementById('job-list-dashboard');
            dashboard.innerHTML = '';
            
            let counts = { wait: 0, doing: 0, spare: 0, done: 0, cancel: 0 };

            jobs.forEach(job => {
                if (job.Status === 'รอรับงาน') counts.wait++;
                else if (job.Status === 'กำลังดำเนินการ') counts.doing++;
                else if (job.Status === 'รออะไหล่') counts.spare++;
                else if (job.Status === 'เสร็จสิ้น') counts.done++;
                else if (job.Status === 'ยกเลิก') counts.cancel++;

                const statusClass = getStatusClass(job.Status);
                const div = document.createElement('div');
                div.className = `job-card ${statusClass}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-slate-400">#${job.JobID}</span>
                        <span class="text-[10px] font-bold uppercase ${statusClass.replace('status-', 'text-')}">${job.Status}</span>
                    </div>
                    <h3 class="font-bold text-slate-700 leading-tight">${job.Problem}</h3>
                    <p class="text-xs text-slate-400 mt-1 italic">📍 ${job.Department}</p>
                `;
                dashboard.appendChild(div);
            });

            // อัปเดตตัวเลข Stats
            document.getElementById('count-wait').innerText = counts.wait;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-spare').innerText = counts.spare;
            document.getElementById('count-done').innerText = counts.done;
            document.getElementById('count-cancel').innerText = counts.cancel;
        }

        function getStatusClass(st) {
            if (st === 'รอรับงาน') return 'status-wait';
            if (st === 'กำลังดำเนินการ') return 'status-doing';
            if (st === 'รออะไหล่') return 'status-spare';
            if (st === 'เสร็จสิ้น') return 'status-done';
            return '';
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-slate-400'));
            
            document.getElementById('tab' + n).classList.add('active');
            document.getElementById('btn-tab' + n).classList.add('nav-active');
            if(n === 1) document.getElementById('btn-tab2').classList.add('text-slate-400');
            else document.getElementById('btn-tab1').classList.add('text-slate-400');
        }
    </script>
</body>
</html>
