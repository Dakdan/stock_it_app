<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service Management - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs">กำลังประมวลผล...</p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบบริหารจัดการครุภัณฑ์คอมพิวเตอร์และบริการ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p>
                    <p id="u-type-name" class="text-[9px] opacity-70"></p>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase tracking-wider">Dashboard</button>
            <button onclick="switchTab(2)" id="t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">My Jobs</button>
            <button onclick="switchTab(3)" id="t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase tracking-wider">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border-l-4 border-pink-500">
                <h2 class="text-pink-600 font-bold text-sm">งานที่คุณกำลังดำเนินการ</h2>
            </div>
            <div id="job-list-myjob" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2 border-b">
                <h3 class="font-bold text-pink-600 text-lg flex items-center gap-2">📄 ข้อมูลการแจ้งซ่อม</h3>
                <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
            </div>
            
            <div id="detail-content" class="space-y-4">
                </div>

            <div id="detail-actions" class="mt-8">
                </div>
        </div>
    </div>

    <div id="modal-transfer" class="overlay">
        <div class="bg-white p-6 rounded-[2rem] w-full max-w-sm mx-4">
            <h3 class="font-bold text-pink-600 mb-4">🔄 โอนงาน/มอบหมายงาน</h3>
            <div class="space-y-3">
                <select id="select-staff" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-pink-500 text-sm"></select>
                <textarea id="transfer-reason" placeholder="ระบุเหตุผลการโอนงาน..." class="w-full p-3 bg-slate-50 rounded-xl border-none outline-pink-500 text-sm h-24"></textarea>
                <button id="btn-confirm-transfer" class="w-full py-3 pink-grad text-white rounded-xl font-bold shadow-lg">ยืนยันการโอน</button>
                <button onclick="closeModal('modal-transfer')" class="w-full py-3 text-slate-400 font-bold text-xs">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        let store = { AllJobs: [], StaffList: [], SystemLink: [] };
        let currentUser = null;

        // --- Core Functions ---
        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) {
                window.location.replace("./login.html");
                return;
            }
            currentUser = JSON.parse(session);
            document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
            document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "Staff";
            
            await loadData();
        }

        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getInitialData', data: { userName: currentUser.UserName } }) 
                });
                const result = await res.json();
                if (result.success) {
                    store = result;
                    renderDashboard();
                    renderMyJobs();
                    renderSystemLinks();
                }
            } catch (e) { console.error("Error loading data"); }
            showLoading(false);
        }

        function renderDashboard() {
            const jobs = store.AllJobs || [];
            updateStats(jobs);

            const container = document.getElementById('job-list-dashboard');
            container.innerHTML = jobs.map(j => {
                const statusColor = getStatusColor(j.Status);
                return `
                    <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${j.Status === 'รอรับงาน' ? 'border-pink-500 status-pulse' : 'border-slate-200'} mb-3">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${j.JobID} | ${j.Priority}</p>
                                <h3 class="font-bold text-slate-700 text-sm mt-1">${j.Problem}</h3>
                                <div class="flex gap-2 items-center mt-2">
                                    <span class="text-[10px] bg-pink-50 text-pink-600 px-2 py-0.5 rounded-full font-bold">🏢 ${j.Department}</span>
                                    ${j.JobType === '2แจ้งซ่อมครุภัณฑ์' ? '<span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold">🔧 ครุภัณฑ์</span>' : ''}
                                </div>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                <span class="text-[9px] font-black uppercase px-2 py-1 rounded ${statusColor}">${j.Status}</span>
                                <span class="text-[9px] text-slate-300 font-bold uppercase">คลิกเพื่อดู ></span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewJobDetail(jobId) {
            const job = store.AllJobs.find(j => j.JobID === jobId);
            if (!job) return;

            const content = document.getElementById('detail-content');
            const actions = document.getElementById('detail-actions');

            // ส่วนที่ 1: ข้อมูลปัญหาพื้นฐาน
            let detailHtml = `
                <div class="bg-pink-50 p-4 rounded-2xl border border-pink-100">
                    <p class="text-[10px] font-bold text-pink-400 mb-1 uppercase tracking-wider">รายละเอียดปัญหา</p>
                    <p class="font-bold text-base text-slate-800 leading-tight">${job.Problem}</p>
                </div>
            `;

            // ส่วนที่ 2: ถ้าเป็นงานครุภัณฑ์ (JobType = 2แจ้งซ่อมครุภัณฑ์) ให้โชว์ข้อมูลครุภัณฑ์
            if (job.JobType === '2แจ้งซ่อมครุภัณฑ์' || job.AssetCode) {
                detailHtml += `
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <p class="text-[10px] font-bold text-blue-400 mb-2 uppercase tracking-wider">ข้อมูลครุภัณฑ์ที่ซ่อม</p>
                        <div class="space-y-1 text-xs">
                            <p><span class="text-blue-500 font-bold">รหัส:</span> <span class="text-slate-700 font-semibold">${job.AssetCode || 'ไม่ระบุ'}</span></p>
                            <p><span class="text-blue-500 font-bold">ชื่อ:</span> <span class="text-slate-700 font-semibold">${job.AssetName || 'ไม่ระบุ'}</span></p>
                        </div>
                    </div>
                `;
            }

            // ส่วนที่ 3: ข้อมูลผู้แจ้งและสถานที่
            detailHtml += `
                <div class="grid grid-cols-2 gap-4 px-1">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">หน่วยงาน</p>
                        <p class="font-semibold text-slate-700 text-sm">${job.Department}</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">ความสำคัญ</p>
                        <p class="font-semibold text-pink-600 text-sm">${job.Priority}</p>
                    </div>
                    <div class="col-span-2 border-t pt-2">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">ผู้แจ้ง/เบอร์ติดต่อ</p>
                        <p class="font-semibold text-slate-700 text-sm">${job.CreateBy || 'ไม่ระบุ'}</p>
                    </div>
                </div>
            `;

            content.innerHTML = detailHtml;

            // ส่วนที่ 4: ปุ่มดำเนินการ
            if (job.Status === 'รอรับงาน' && (currentUser.UserTypeID === 'IT' || currentUser.UserTypeID === 'Admin')) {
                actions.innerHTML = `
                    <button onclick="handleJob('${job.JobID}', 'accept'); closeModal('modal-detail');" 
                            class="w-full py-5 pink-grad text-white rounded-[1.5rem] font-bold shadow-xl active:scale-95 transition-all text-base">
                        ⚡ ยืนยันรับงานเข้าเครื่องฉัน
                    </button>`;
            } else {
                actions.innerHTML = `
                    <button onclick="closeModal('modal-detail')" 
                            class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs">
                        ปิดหน้าต่าง
                    </button>`;
            }

            document.getElementById('modal-detail').style.display = 'flex';
        }

        function renderMyJobs() {
            const myJobs = store.AllJobs.filter(j => j.Owner === currentUser.UserName && j.Status === 'กำลังดำเนินการ');
            const container = document.getElementById('job-list-myjob');
            
            if (myJobs.length === 0) {
                container.innerHTML = '<div class="p-10 text-center opacity-40 italic text-xs">ไม่มีงานค้างในมือ</div>';
                return;
            }

            container.innerHTML = myJobs.map(j => `
                <div class="card-pro p-5 border-l-8 border-blue-500 mb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[10px] text-slate-400 font-bold">${j.JobID}</p>
                            <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                            <p class="text-[10px] text-blue-500 mt-1 font-bold">📍 ${j.Department}</p>
                        </div>
                        <div class="flex flex-col gap-2 ml-2">
                            <button onclick="handleJob('${j.JobID}', 'done')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-md">ปิดงาน</button>
                            <button onclick="openTransfer('${j.JobID}')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-bold">โอนงาน</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Helper Functions ---
        async function handleJob(jobId, type, extra = {}) {
            showLoading(true);
            const data = { JobID: jobId, type: type, Owner: currentUser.UserName, ...extra };
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateJobStatus', data: data }) });
                const result = await res.json();
                if (result.success) { 
                    closeModal('modal-transfer');
                    await loadData(); 
                }
            } catch (e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
            showLoading(false);
        }

        function updateStats(jobs) {
            document.getElementById('count-wait').innerText = jobs.filter(j => j.Status === 'รอรับงาน').length;
            document.getElementById('count-doing').innerText = jobs.filter(j => j.Status === 'กำลังดำเนินการ').length;
            document.getElementById('count-spare').innerText = jobs.filter(j => j.Status === 'รออะไหล่').length;
            document.getElementById('count-done').innerText = jobs.filter(j => j.Status === 'เสร็จสิ้น').length;
            document.getElementById('count-cancel').innerText = jobs.filter(j => j.Status === 'ยกเลิก').length;
        }

        function getStatusColor(status) {
            switch(status) {
                case 'รอรับงาน': return "text-pink-600 bg-pink-100 border border-pink-200";
                case 'กำลังดำเนินการ': return "text-blue-500 bg-blue-100 border border-blue-200";
                case 'เสร็จสิ้น': return "text-green-500 bg-green-100 border border-green-200";
                default: return "text-slate-500 bg-slate-100";
            }
        }

        function renderSystemLinks() {
            const container = document.getElementById('tab3');
            container.innerHTML = (store.SystemLink || []).map(l => `
                <a href="${l.URL}" target="_blank" class="bg-white p-4 rounded-2xl flex items-center gap-3 shadow-sm border border-pink-50">
                    <span class="text-2xl">${l.Linkicon || '🔗'}</span>
                    <span class="font-bold text-slate-700 text-sm">${l.SystemName || l.Name}</span>
                </a>
            `).join('');
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('nav button').forEach((b, i) => { 
                b.classList.remove('text-pink-600', 'border-pink-600'); 
                b.classList.add('text-slate-400', 'border-transparent'); 
                if(i+1 === n) b.classList.add('text-pink-600', 'border-pink-600');
            });
        }

        function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { if (confirm("ยืนยันออกจากระบบ?")) { localStorage.clear(); window.location.replace("./login.html"); } }
        
        function openTransfer(jobId) {
            const modal = document.getElementById('modal-transfer');
            const select = document.getElementById('select-staff');
            select.innerHTML = store.StaffList.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            modal.style.display = 'flex';
            document.getElementById('btn-confirm-transfer').onclick = () => {
                const reason = document.getElementById('transfer-reason').value;
                if (!reason) return alert("ระบุเหตุผล");
                handleJob(jobId, 'transfer', { NewOwner: select.value, Reason: reason });
            };
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
