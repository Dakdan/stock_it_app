<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
    let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], JobTypeMaster: [], BackupData: [], JobSubTypeMaster: [], SeviceMA: [] };
    let currentUser = null;
    let currentTab = 1; 

    async function initApp() {
        const session = localStorage.getItem("it_session");
        if (!session) { window.location.replace("./login.html"); return; }
        currentUser = JSON.parse(session);
        document.getElementById('u-fname').innerText = currentUser.UserName + " " + (currentUser.UserSname || "");
        document.getElementById('u-type-name').innerText = currentUser.UserTypeName || "Staff";
        await loadData();
    }

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'getInitialData', 
                    data: { userName: currentUser.UserName, USERID: currentUser.USERID } 
                }) 
            });
            const result = await res.json();
            if (result.success) {
                store = result;
                renderDashboard();
                renderMyJobs();
                renderITTicketList();
                renderSystemLinks();
                // renderDeptList(); // ปลดคอมเมนต์ออกได้หากต้องการให้โหลดแผนกทันที
            }
        } catch (e) { console.error("Data error", e); }
        showLoading(false);
    }

    function getStatusColor(status) {
        const s = String(status || '').trim();
        if (s === 'รอรับงาน') return "text-pink-600 bg-pink-50 border border-pink-200";
        if (s === 'กำลังดำเนินการ') return "text-blue-600 bg-blue-50 border border-blue-200";
        if (s === 'รออะไหล่') return "text-orange-600 bg-orange-50 border border-orange-200";
        if (s === 'เสร็จสิ้น') return "text-green-600 bg-green-50 border border-green-200";
        if (s === 'ยกเลิก') return "text-slate-400 bg-slate-50 border border-slate-200";
        return "text-slate-500 bg-slate-100 border border-slate-200";
    }

    function renderDashboard() {
        const jobs = store.AllJobs || [];
        updateStats(jobs);
        
        document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => {
            const status = String(j.Status || '').trim();
            const staff = (store.StaffList || []).find(s => String(s.id).trim() === String(j.Owner).trim());
            const ownerName = staff ? staff.name : (j.Owner && j.Owner !== "-" ? j.Owner : "ยังไม่มีผู้ดูแล");

            let shadowClass = "shadow-sm";
            let borderClass = "border-slate-200";
            if (status === 'รอรับงาน') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(219,39,119,0.35)]";
                borderClass = "border-pink-500 status-pulse";
            } else if (status === 'กำลังดำเนินการ') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(59,130,246,0.3)]";
                borderClass = "border-blue-500";
            } else if (status === 'รออะไหล่') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(251,146,60,0.3)]";
                borderClass = "border-orange-400";
            } else if (status === 'เสร็จสิ้น') {
                shadowClass = "shadow-[0_8px_20px_-5px_rgba(34,197,94,0.2)]";
                borderClass = "border-green-500";
            }

            const assetInfo = (store.BackupData || []).find(a => String(a.NOID) === String(j.AssetCode));
            let assetBoxHTML = "";
            if (j.AssetCode && j.AssetCode !== "" && j.AssetCode !== "-") {
                const displayID = assetInfo ? assetInfo.AssetID : j.AssetCode;
                assetBoxHTML = `
                    <div class="bg-slate-50 p-2 rounded-xl border border-slate-100 mt-2">
                        <p class="text-[9px] text-slate-500 font-bold uppercase">📦 ครุภัณฑ์: ${displayID}</p>
                    </div>`;
            }

            return `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${borderClass} ${shadowClass} mb-4 transition-all duration-300">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400">#${j.JobID}</span>
                            <span class="text-[9px] text-slate-400 ml-2">📅 ${j.CreateDate || ''}</span>
                        </div>
                        <span class="text-[10px] font-black uppercase px-2.5 py-1 rounded-lg ${getStatusColor(status)}">
                            ${status}
                        </span>
                    </div>
                    <div class="space-y-2">
                        <div>
                            <p class="text-[10px] font-bold text-pink-500 uppercase">${j.JobType || ''}</p>
                            <h3 class="font-bold text-slate-700 text-sm leading-snug">${j.Problem}</h3>
                        </div>
                        ${assetBoxHTML}
                        <div class="flex justify-between items-end pt-2 border-t border-slate-50 mt-2">
                            <div class="space-y-1">
                                <p class="text-[8px] text-slate-400 uppercase font-bold">ผู้รับผิดชอบ</p>
                                <p class="text-[10px] font-bold text-blue-600 italic leading-tight">👷 ${ownerName}</p>
                            </div>
                            <div class="text-right space-y-1">
                                <p class="text-[9px] font-bold text-slate-500">🏨 ${j.Department}</p>
                                <p class="text-[10px] font-bold ${String(j.Priority).includes('ด่วน') ? 'text-red-500' : 'text-orange-500'}">
                                    ⚠️ ${j.Priority}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderMyJobs() {
        const myJobs = (store.AllJobs || []).filter(j => 
            String(j.Owner).trim() === String(currentUser.USERID).trim() && 
            String(j.Status).trim() === 'กำลังดำเนินการ'
        );
        const container = document.getElementById('job-list-myjob');
        if (myJobs.length > 0) {
            container.innerHTML = myJobs.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 border-blue-500 mb-3 shadow-[0_8px_15px_-3px_rgba(59,130,246,0.2)]">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold">${j.JobID}</p>
                            <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                            <p class="text-[9px] text-blue-500 mt-1 font-bold">📍 ${j.Department}</p>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${getStatusColor(j.Status)} uppercase">
                            ${j.Status}
                        </span>
                    </div>
                </div>`).join('');
        } else {
            container.innerHTML = '<div class="p-8 text-center opacity-40 italic text-xs bg-white rounded-2xl border-dashed border border-slate-200">ไม่มีงานที่กำลังดำเนินการของคุณ</div>';
        }
    }

    async function handleJobUI(jobId, type, extra = {}) {
        closeModal('modal-detail');
        closeModal('modal-transfer');
        closeModal('modal-close-job');
        showLoading(true);

        const data = { 
            JobID: jobId, 
            type: type, 
            Owner: currentUser.USERID, 
            By: currentUser.UserName, 
            ...extra 
        }; 

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'updateJobStatus', data: data }) 
            });
            const result = await res.json();
            if (result.success) { 
                showLoading(false);
                document.getElementById('success-text').innerText = "ดำเนินการสำเร็จ!";
                document.getElementById('modal-success').style.display = 'flex';
                await loadData(); 
                setTimeout(() => { closeModal('modal-success'); }, 1500);
            } else {
                showLoading(false);
                alert("ผิดพลาด: " + result.message);
            }
        } catch (e) { 
            showLoading(false);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); 
        }
    }

    function viewJobDetail(jobId) {
        const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
        if (!job) return;

        const status = String(job.Status || '').trim();
        const role = String(currentUser.UserTypeID).toUpperCase().trim();
        const isOwner = String(job.Owner).trim() === String(currentUser.USERID).trim();
        
        const content = document.getElementById('detail-content');
        const actions = document.getElementById('detail-actions');
        const staff = (store.StaffList || []).find(s => String(s.id).trim() === String(job.Owner).trim());
        const ownerDisplayName = staff ? staff.name : (job.Owner || 'ยังไม่มี');

        let assetHTML = '';
        if (job.AssetCode && job.AssetCode !== "" && job.AssetCode !== "-") {
            const asset = (store.BackupData || []).find(a => String(a.NOID) === String(job.AssetCode));
            if (asset) {
                assetHTML = `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-4">
                    <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">📦 ข้อมูลครุภัณฑ์</p>
                    <p class="text-xs font-bold text-slate-700">${asset.AssetID || '-'} : ${asset.AssetName || ''}</p>
                </div>`;
            }
        }

        content.innerHTML = `
        <div class="space-y-4 text-left">
            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100">
                <p class="text-[10px] font-bold text-pink-400 mb-1">รายละเอียดปัญหา [${job.JobType || 'ทั่วไป'}]</p>
                <h2 class="font-bold text-xl text-slate-800">${job.Problem}</h2>
            </div>
            <div class="bg-pink-50/30 p-4 rounded-2xl border border-pink-50 flex items-start gap-3">
                <div class="p-2 bg-white rounded-xl shadow-sm">🏨</div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">หน่วยงาน</p>
                    <p class="font-bold text-slate-700 text-sm leading-tight mb-2">${job.Department}</p>
                    <p class="text-[10px] text-blue-400 font-bold uppercase flex items-center gap-1">🛡️ ความสำคัญ</p>
                    <p class="font-bold text-pink-500 text-sm">${job.Priority}</p>
                </div>
            </div>
            ${assetHTML}
            <div class="border-t border-slate-100 pt-4 px-1">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1 flex items-center gap-1">📞 เบอร์โทรศัพท์ติดต่อ</p>
                <p class="font-bold text-blue-600 text-lg">${job.phon || '-'}</p>
            </div>
            <div class="border-t border-slate-100 pt-4 px-1">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">สถานะปัจจุบัน</p>
                <span class="text-[10px] font-black uppercase px-4 py-1.5 rounded-full ${getStatusColor(status)}">${status}</span>
            </div>
            <div class="pt-2 px-1 pb-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">ผู้ดูแลงาน</p>
                <p class="font-bold text-slate-600 text-sm flex items-center gap-2">🧑‍🔧 ${ownerDisplayName}</p>
            </div>
        </div>`;

        let btns = '';
        if (status === 'รอรับงาน') {
            if (role === 'IT') {
                btns = `<button onclick="handleJobUI('${job.JobID}', 'accept')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all mb-2">⚡ รับงาน</button>`;
            } else if (role === 'BOSS') {
                btns = `<button onclick="openTransfer('${job.JobID}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all mb-2">📋 มอบหมายงาน</button>`;
            }
        } else if (status === 'กำลังดำเนินการ' && isOwner) {
            btns = `
            <div class="grid grid-cols-2 gap-3 w-full">
                <button onclick="openCloseJobForm('${job.JobID}')" class="py-4 bg-[#22C55E] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">✅ ปิดงาน</button>
                <button onclick="openTransfer('${job.JobID}')" class="py-4 bg-[#EFF6FF] text-[#3B82F6] rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center gap-2 border border-blue-100">🔄 โอนงาน</button>
            </div>`;
        } else if (status === 'รออะไหล่' && isOwner) {
            btns = `<button onclick="openCloseJobForm('${job.JobID}')" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all mb-2">✅ ปิดงาน (อะไหล่มาแล้ว)</button>`;
        } else if (status !== 'เสร็จสิ้น' && status !== 'ยกเลิก') {
            btns = `<div class="p-4 text-center text-[11px] text-blue-500 font-bold bg-blue-50 rounded-2xl border border-dashed border-blue-200">งานนี้ดำเนินการโดย ${ownerDisplayName}</div>`;
        }

        btns += `<button onclick="closeModal('modal-detail')" class="w-full py-3 text-slate-400 font-bold text-xs mt-4 uppercase tracking-widest">CLOSE DETAIL</button>`;
        actions.innerHTML = btns;
        document.getElementById('modal-detail').style.display = 'flex';
    }

    function loadCloseJobMaster() {
        const typeSelect = document.getElementById('close-job-type');
        const subSelect = document.getElementById('close-job-subtype');
        const typeData = store.JobTypeMaster || []; 
        const subTypeData = store.JobSubTypeMaster || []; 

        typeSelect.innerHTML = '<option value="" disabled selected>-- เลือกประเภทงาน--</option>';
        typeData.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.JobTypeCode;
            opt.textContent = item.JobTypeName;
            typeSelect.appendChild(opt);
        });

        typeSelect.onchange = function() {
            const selectedCode = this.value;
            const filtered = subTypeData.filter(sub => String(sub.JobTypeCode) === String(selectedCode));
            subSelect.innerHTML = '<option value="" disabled selected>-- เลือกงาน --</option>';
            filtered.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub.SubTypeName;
                opt.textContent = sub.SubTypeName;
                subSelect.appendChild(opt);
            });
        };
    }

    function openCloseJobForm(jobId) {
        closeModal('modal-detail');
        document.getElementById('close-job-note').value = "";
        document.getElementById('close-job-remark').value = "";
        loadCloseJobMaster();
        document.getElementById('modal-close-job').style.display = 'flex';

        document.getElementById('btn-confirm-close').onclick = async () => {
            const note = document.getElementById('close-job-note').value;
            const typeSelect = document.getElementById('close-job-type');
            const subTypeSelect = document.getElementById('close-job-subtype');
            if (!typeSelect.value || !subTypeSelect.value || !note) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }
            const typeNameText = typeSelect.options[typeSelect.selectedIndex].text;
            await handleJobUI(jobId, 'done', { 
                Note: note,
                JobTypeName: typeNameText,
                SubTypeName: subTypeSelect.value,
                CloseStatus: document.getElementById('close-job-status').value,
                Remark: document.getElementById('close-job-remark').value
            });
        };
    }

    function openTransfer(jobId) {
        const select = document.getElementById('select-staff');
        const role = String(currentUser.UserTypeID || '').toUpperCase();
        document.querySelector('#modal-transfer h3').innerText = (role === 'BOSS') ? "📋 มอบหมายงานใหม่" : "🔄 โอนงาน";
        select.innerHTML = (store.StaffList || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('modal-transfer').style.display = 'flex';
        document.getElementById('btn-confirm-transfer').onclick = async () => {
            const newOwner = select.value;
            const reason = document.getElementById('transfer-reason').value;
            if(!newOwner) return alert("กรุณาเลือกเจ้าหน้าที่");
            await handleJobUI(jobId, (role === 'BOSS' ? 'assign' : 'transfer'), { NewOwner: newOwner, Reason: reason });
            document.getElementById('transfer-reason').value = "";
        };
    }

    function openITTicketForm() {
        const form = document.getElementById('form-it-ticket');
        if(form) form.reset();
        loadITTicketMaster();
        document.getElementById('modal-it-ticket').style.display = 'flex';

        document.getElementById('form-it-ticket').onsubmit = async (e) => {
            e.preventDefault();
            const typeSelect = document.getElementById('it-job-type');
            const subSelect = document.getElementById('it-job-sub-type');
            const problemInput = document.getElementById('it-problem');
            const deptSelect = document.getElementById('it-dept');

            if (!typeSelect.value || !subSelect.value || !problemInput.value || !deptSelect.value) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            showLoading(true);
            const data = { 
                action: 'saveITTicket', 
                data: { 
                    jobType: typeSelect.options[typeSelect.selectedIndex].text,
                    jobSubType: subSelect.value, 
                    problem: problemInput.value, 
                    dept: deptSelect.value, 
                    owner: currentUser.USERID 
                } 
            };
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await res.json();
                if (result.success) {
                    showInnerAlert('modal-it-ticket', 'บันทึกสำเร็จ');
                    await loadData();
                }
            } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
            showLoading(false);
        };
    }

    function loadITTicketMaster() {
        const typeSelect = document.getElementById('it-job-type');
        const subSelect = document.getElementById('it-job-sub-type');
        const deptSelect = document.getElementById('it-dept');
        if (!typeSelect || !subSelect || !deptSelect) return;

        deptSelect.innerHTML = '<option value="" disabled selected>-- เลือกหน่วยงาน --</option>';
        (store.DeptList || []).forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.Department;
            opt.textContent = d.Department;
            deptSelect.appendChild(opt);
        });

        const typeData = store.JobTypeMaster || [];
        typeSelect.innerHTML = '<option value="" disabled selected>-- เลือกประเภทงาน --</option>';
        typeData.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.JobTypeCode;
            opt.textContent = item.JobTypeName;
            typeSelect.appendChild(opt);
        });

        typeSelect.onchange = function() {
            const selectedCode = this.value;
            const subTypeData = store.JobSubTypeMaster || [];
            const filtered = subTypeData.filter(sub => String(sub.JobTypeCode) === String(selectedCode));
            subSelect.innerHTML = '<option value="" disabled selected>-- เลือกหมวดหมู่ย่อย --</option>';
            filtered.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub.SubTypeName;
                opt.textContent = sub.SubTypeName;
                subSelect.appendChild(opt);
            });
        };
    }

    function renderITTicketList() {
        const container = document.getElementById('it-ticket-list');
        if (!store.ITTickets || store.ITTickets.length === 0) {
            container.innerHTML = '<div class="text-center p-6 text-slate-400 text-[10px]">ไม่พบประวัติ</div>';
            return;
        }
        container.innerHTML = store.ITTickets.map(it => `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-blue-50 flex justify-between items-center">
                <div>
                    <p class="text-[8px] text-blue-500 font-bold">${it.JobType}</p>
                    <p class="text-xs font-bold text-slate-700">${it.Problem}</p>
                    <p class="text-[8px] text-slate-400 mt-1">${it.Date || '-'} | ${it.Department}</p>
                </div>
                <span class="text-[8px] text-green-500 font-bold bg-green-50 px-2 py-1 rounded-full">Saved</span>
            </div>`).join('');
    }

    function renderSystemLinks() {
        const tab3Container = document.getElementById('tab3');
        if (!tab3Container || currentTab !== 3) {
            if(tab3Container) {
                tab3Container.innerHTML = ''; tab3Container.style.display = 'none';
            }
            return;
        }
        tab3Container.style.display = 'grid';
        const links = store.SystemLink || [];
        if (links.length === 0) {
            tab3Container.innerHTML = '<div class="col-span-full text-center p-10 text-slate-400 italic text-sm">ไม่มีข้อมูลลิงก์ระบบ</div>';
            return;
        }
        tab3Container.innerHTML = links.filter(l => String(l.Active).toUpperCase() === "TRUE").map(l => `
            <a href="${l.URL}" target="_blank" class="bg-white p-4 rounded-2xl flex items-center gap-3 shadow-sm border border-pink-50 hover:bg-pink-50 transition-all active:scale-95">
                <span class="text-2xl">${l.Linkicon || '🔗'}</span>
                <div class="flex flex-col">
                    <span class="font-bold text-slate-700 text-sm">${l.Name || 'ไม่ระบุชื่อ'}</span>
                    <p class="text-[9px] text-slate-400 truncate w-40">${l.URL}</p>
                </div>
            </a>`).join('');
    }

    function updateStats(jobs) {
        const getCount = (s) => jobs.filter(j => String(j.Status).trim() === s).length;
        document.getElementById('count-wait').innerText = getCount('รอรับงาน');
        document.getElementById('count-doing').innerText = getCount('กำลังดำเนินการ');
        document.getElementById('count-spare').innerText = getCount('รออะไหล่');
        document.getElementById('count-done').innerText = getCount('เสร็จสิ้น');
        document.getElementById('count-cancel').innerText = getCount('ยกเลิก');
    }

    function switchTab(n) {
        currentTab = n; 
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab' + n).classList.add('active');
        document.querySelectorAll('nav button').forEach((b, i) => { 
            const isActive = (i + 1 === n);
            b.classList.toggle('text-pink-600', isActive);
            b.classList.toggle('border-pink-600', isActive);
            b.classList.toggle('text-slate-400', !isActive);
            b.classList.toggle('border-transparent', !isActive);
        });
        renderSystemLinks(); 
    }

    function showInnerAlert(modalId, text) {
        const alertDiv = document.querySelector(`#${modalId} .inner-alert`);
        if(alertDiv) {
            alertDiv.querySelector('p').innerText = text;
            alertDiv.style.display = 'flex';
            setTimeout(() => { alertDiv.style.display = 'none'; closeModal(modalId); }, 1800);
        }
    }

    function logout() { document.getElementById('modal-logout').style.display = 'flex'; }
    async function confirmLogout() {
        document.getElementById('logout-alert').style.display = 'flex';
        setTimeout(() => { localStorage.clear(); window.location.replace("./login.html"); }, 1500);
    }

    function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    function closeModal(id) {
        const el = document.getElementById(id);
        if(el) {
            el.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }
    function openModal(id) {
        const el = document.getElementById(id);
        if(el) {
            el.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
