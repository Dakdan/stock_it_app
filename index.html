<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        /* ทำลายน้ำ (Watermark) พื้นหลัง */
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        /* สไตล์สำหรับหน้าจอที่โผล่ขึ้นมาบัง (Overlay/Modal) */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; } /* แสดงเนื้อหาเฉพาะ Tab ที่เลือก */
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        /* แอนิเมชันไฟกะพริบสำหรับงานใหม่ */
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
        /* หน้าต่างแจ้งเตือนเล็กๆ ภายใน Modal */
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...<br><span class="text-[9px] font-normal text-slate-400 italic">กรุณารอสักครู่</span></p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบจัดการงานซ่อมและบริการ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p> <p id="u-type-name" class="text-[9px] opacity-70"></p> </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4">
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border-l-4 border-pink-500">
                <h2 class="text-pink-600 font-bold text-sm">งานที่รับผิดชอบ (กำลังทำ)</h2>
            </div>
            <div id="job-list-myjob" class="space-y-3"></div>
            <hr class="border-pink-100 my-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-blue-600 font-bold text-sm border-l-4 border-blue-500 pl-2">IT Ticket (บันทึกงานอื่นๆ)</h2>
                <button onclick="openITTicketForm()" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md">+ บันทึกงาน</button>
            </div>
            <div id="it-ticket-list" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </main>

    <div id="modal-detail" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl overflow-hidden relative">
            <div id="detail-alert" class="inner-alert">
                <div class="bg-pink-100 p-4 rounded-full mb-3 status-pulse"><span class="text-3xl">✅</span></div>
                <p id="detail-alert-text" class="text-pink-600 font-bold">ดำเนินการสำเร็จ</p>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                    <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
                </div>
                <div id="detail-content" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
                <div id="detail-actions" class="mt-6 flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modal-logout" class="overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-sm mx-4 shadow-2xl relative overflow-hidden">
            <div id="logout-alert" class="inner-alert">
                <div class="bg-pink-100 p-4 rounded-full mb-3 status-pulse"><span class="text-3xl">👋</span></div>
                <p class="text-pink-600 font-bold">ออกจากระบบสำเร็จ</p>
            </div>
            <div class="p-8 text-center">
                <div class="w-20 h-20 bg-pink-50 rounded-full flex items-center justify-center mx-auto mb-4"><span class="text-4xl">🚪</span></div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">ยืนยันการออกจากระบบ?</h3>
                <div class="flex gap-3 mt-8">
                    <button onclick="closeModal('modal-logout')" class="flex-1 py-3 text-slate-400 font-bold text-sm bg-slate-50 rounded-2xl">ยกเลิก</button>
                    <button onclick="confirmLogout()" class="flex-1 py-3 pink-grad text-white rounded-2xl font-bold shadow-lg">ยืนยัน</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ที่อยู่ของ API หลังบ้าน (Google Apps Script)
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        // ตัวแปรเก็บข้อมูลทั้งหมดที่ดึงมาจาก Server
        let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], BackupData: [] };
        let currentUser = null; // ข้อมูลผู้ใช้ที่ล็อกอินอยู่
        let currentTab = 1; // แท็บปัจจุบันที่ผู้ใช้เปิดดูอยู่

        // ฟังก์ชันเริ่มต้นเมื่อเปิดหน้าเว็บ
        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) { window.location.replace("./login.html"); return; } // ถ้าไม่มี Session ให้เด้งไปหน้า Login
            currentUser = JSON.parse(session);
            document.getElementById('u-fname').innerText = currentUser.UserName; // โชว์ชื่อ
            document.getElementById('u-type-name').innerText = currentUser.UserTypeName; // โชว์ตำแหน่ง
            await loadData(); // เรียกโหลดข้อมูล
        }

        // ฟังก์ชันดึงข้อมูลจาก Server
        async function loadData() {
            showLoading(true); // แสดงสถานะกำลังโหลด
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getInitialData', data: { USERID: currentUser.USERID } }) 
                });
                const result = await res.json();
                if (result.success) {
                    store = result; // เก็บข้อมูลลงตัวแปร store
                    renderDashboard(); // วาดหน้าจอ Dashboard
                    renderMyJobs(); // วาดหน้าจอ My Jobs
                    renderSystemLinks(); // วาดหน้าจอ Links
                }
            } catch (e) { console.error("Data error"); }
            showLoading(false); // ปิดสถานะกำลังโหลด
        }

        // ฟังก์ชันแสดงรายการงานใน Dashboard
        function renderDashboard() {
            const jobs = store.AllJobs || [];
            updateStats(jobs); // อัปเดตตัวเลขสถิติด้านบน
            document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${j.Status === 'รอรับงาน' ? 'border-pink-500 status-pulse' : 'border-slate-200'} mb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${j.JobID} | ${j.Priority}</p>
                            <h3 class="font-bold text-slate-700 text-sm mt-0.5">${j.Problem}</h3>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[9px] bg-pink-50 text-pink-600 px-2 py-0.5 rounded-full font-bold">🏢 ${j.Department}</span>
                            </div>
                        </div>
                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded ${getStatusColor(j.Status)}">${j.Status}</span>
                    </div>
                </div>
            `).join('');
        }

        // ฟังก์ชันแสดงรายละเอียดงานและจับคู่ครุภัณฑ์
        function viewJobDetail(jobId) {
            const job = store.AllJobs.find(j => String(j.JobID) === String(jobId));
            if (!job) return;
            
            // --- ส่วนสำคัญ: จับคู่ AssetCode (จากงานแจ้งซ่อม) กับ NOID (จากฐานข้อมูลครุภัณฑ์) ---
            let assetHTML = '';
            if (job.AssetCode) {
                const asset = (store.BackupData || []).find(a => String(a.NOID) === String(job.AssetCode));
                if (asset) {
                    assetHTML = `<div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mt-4">
                        <p class="text-[10px] font-bold text-blue-500 mb-2">📦 ข้อมูลครุภัณฑ์ (AssetID: ${asset.AssetID || 'N/A'})</p>
                        <p class="text-xs text-slate-700 font-bold">${asset.AssetName || ''}</p>
                        <p class="text-[10px] text-slate-500 mt-1">${asset.Spac || ''}</p>
                    </div>`;
                }
            }

            document.getElementById('detail-content').innerHTML = `
                <div class="bg-pink-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-bold text-pink-400 mb-1 uppercase">ปัญหาที่แจ้ง</p>
                    <p class="font-bold text-base text-slate-800 leading-tight">${job.Problem}</p>
                </div>
                ${assetHTML}
                <div class="grid grid-cols-2 gap-4 mt-4 px-1">
                    <div><p class="text-[10px] text-slate-400 font-bold">หน่วยงาน</p><p class="text-xs font-bold text-slate-600">${job.Department}</p></div>
                    <div><p class="text-[10px] text-slate-400 font-bold">สถานะ</p><p class="text-xs font-bold text-pink-600">${job.Status}</p></div>
                </div>`;
            
            // ตรรกะการแสดงปุ่ม: ถ้าเป็นสถานะ 'รอรับงาน' และผู้ใช้เป็น 'IT' ให้แสดงปุ่มรับงาน
            let btns = '';
            if (job.Status === 'รอรับงาน' && currentUser.UserTypeID === 'IT') {
                btns = `<button onclick="handleJobUI('${job.JobID}', 'accept')" class="w-full py-4 pink-grad text-white rounded-2xl font-bold">⚡ รับงาน</button>`;
            }
            btns += `<button onclick="closeModal('modal-detail')" class="w-full py-2 text-slate-400 text-[10px] uppercase font-bold">ปิดหน้าต่าง</button>`;
            
            document.getElementById('detail-actions').innerHTML = btns;
            document.getElementById('modal-detail').style.display = 'flex';
        }

        // ฟังก์ชันสลับหน้าจอ (Tab Switch)
        function switchTab(n) {
            currentTab = n;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active'); // เปิดแท็บที่เลือก
            // เปลี่ยนสีปุ่มเมนูให้ดูเด่นขึ้นเมื่อถูกเลือก
            document.querySelectorAll('nav button').forEach((b, i) => {
                const isActive = (i + 1 === n);
                b.classList.toggle('text-pink-600', isActive);
                b.classList.toggle('border-pink-600', isActive);
                b.classList.toggle('text-slate-400', !isActive);
                b.classList.toggle('border-transparent', !isActive);
            });
        }

        // ฟังก์ชันล็อกเอาต์
        function logout() { document.getElementById('modal-logout').style.display = 'flex'; }
        async function confirmLogout() {
            document.getElementById('logout-alert').style.display = 'flex';
            setTimeout(() => { localStorage.clear(); window.location.replace("./login.html"); }, 1500);
        }

        // ฟังก์ชันเปิด/ปิดหน้าจอโหลด
        function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเสร็จ
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
