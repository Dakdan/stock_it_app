<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; min-height: 100vh; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay"><div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center"><div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div><p class="text-pink-600 font-bold text-xs">กำลังประมวลผล...</p></div></div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" onerror="this.src='https://via.placeholder.com/50?text=IT'">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p id="u-info" class="text-[10px] opacity-80">กำลังโหลดข้อมูลผู้ใช้...</p>
                </div>
            </div>
            <button onclick="logout()" class="bg-white/20 p-2 rounded-xl text-xs">🚪 ออกจากระบบ</button>
        </div>
    </header>

    <nav class="bg-white/90 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100 flex max-w-4xl mx-auto">
        <button onclick="switchTab(1)" id="t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600">DASHBOARD</button>
        <button onclick="switchTab(2)" id="t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400">MY JOBS</button>
        <button onclick="switchTab(3)" id="t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400">LINKS</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        <div id="tab1" class="tab-content active space-y-4">
            <div id="counters" class="grid grid-cols-4 gap-2">
                <div class="bg-white p-2 rounded-xl text-center shadow-sm border border-pink-50"><p class="text-[9px] text-slate-400 font-bold">รอรับงาน</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-2 rounded-xl text-center shadow-sm border border-pink-50"><p class="text-[9px] text-slate-400 font-bold">กำลังทำ</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-2 rounded-xl text-center shadow-sm border border-pink-50"><p class="text-[9px] text-slate-400 font-bold">เสร็จสิ้น</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-2 rounded-xl text-center shadow-sm border border-pink-50"><p class="text-[9px] text-slate-400 font-bold">ยกเลิก</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div>
        </div>

        <div id="tab2" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-pink-100">
                <h2 class="text-sm font-bold text-pink-600 italic">งานในความรับผิดชอบของคุณ</h2>
                <button onclick="alert('กำลังพัฒนาฟอร์มบันทึก IT_Ticket')" class="bg-pink-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">+ บันทึกงานใหม่</button>
            </div>
            <div id="job-list-myjob" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-2 gap-3"></div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec';
        let store = { AllJobs: [], StaffList: [], SystemLink: [] };
        let currentUser = null;

        // 1. ตรวจสอบการ Login และดึงข้อมูล
        async function initApp() {
            const session = localStorage.getItem("it_session");
            if (!session) {
                window.location.replace("login.html");
                return;
            }
            currentUser = JSON.parse(session);
            document.getElementById('u-info').innerText = `${currentUser.UserName} | ${currentUser.UserTypeName || 'Staff'}`;
            await loadData();
        }

        // 2. ดึงข้อมูลจาก Google Sheets
        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getInitialData', data: { userName: currentUser.UserName } }) 
                });
                const result = await res.json();
                if (result.success) {
                    store = result;
                    renderDashboard();
                    renderMyJobs();
                    renderLinks();
                }
            } catch (e) { alert("ไม่สามารถดึงข้อมูลได้ กรุณาลองใหม่"); }
            showLoading(false);
        }

        // 3. แสดงรายการงานทั้งหมด (Dashboard)
        function renderDashboard() {
            const jobs = store.AllJobs || [];
            document.getElementById('count-wait').innerText = jobs.filter(j => j.Status === 'รอรับงาน').length;
            document.getElementById('count-doing').innerText = jobs.filter(j => j.Status === 'กำลังดำเนินการ').length;
            document.getElementById('count-done').innerText = jobs.filter(j => j.Status === 'เสร็จสิ้น').length;
            document.getElementById('count-cancel').innerText = jobs.filter(j => j.Status === 'ยกเลิก').length;

            const html = jobs.map(j => `
                <div class="card-pro p-4 border-l-4 ${j.Status === 'รอรับงาน' ? 'border-pink-500 status-pulse' : 'border-slate-200'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold">${j.JobID} | ${j.Priority || 'ปกติ'}</p>
                            <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                            <p class="text-[10px] text-pink-600 mt-1">🏢 ${j.Department}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] px-2 py-1 bg-slate-100 rounded block mb-2">${j.Status}</span>
                            ${j.Status === 'รอรับงาน' ? `<button onclick="handleAction('${j.JobID}', 'accept')" class="bg-pink-600 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-md active:scale-95 transition-transform">รับงาน</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('job-list-dashboard').innerHTML = html || '<p class="text-center text-xs py-10 text-slate-400">ไม่มีรายการงาน</p>';
        }

        // 4. แสดงรายการงานที่ฉันรับผิดชอบ (My Jobs)
        function renderMyJobs() {
            const myJobs = (store.AllJobs || []).filter(j => j.Owner === currentUser.UserName && j.Status !== 'เสร็จสิ้น');
            const html = myJobs.map(j => `
                <div class="card-pro p-4 border-l-4 border-blue-500">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[9px] text-slate-400">${j.JobID}</p>
                            <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="handleAction('${j.JobID}', 'done')" class="bg-green-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold shadow-sm">ปิดงาน</button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('job-list-myjob').innerHTML = html || '<p class="text-center text-xs py-10 text-slate-400 italic">ไม่มีงานค้างในมือ</p>';
        }

        // 5. จัดการรับงาน / ปิดงาน
        async function handleAction(jobId, actionType) {
            showLoading(true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'updateJobStatus', 
                        data: { JobID: jobId, type: actionType, Owner: currentUser
