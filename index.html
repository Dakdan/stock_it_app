<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service And Mainternance - รพ.อุดรธานี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2f8; position: relative; min-height: 100vh; }
        body::before { content: "IT UDON HOSP"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; z-index: -1; }
        .pink-grad { background: linear-gradient(135deg, #be185d 0%, #db2777 100%); }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; justify-content:center; align-items:center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card-pro { background: white; border-radius: 1.2rem; border: 1px solid #fce7f3; transition: 0.3s; cursor: pointer; }
        .card-pro:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(190, 24, 93, 0.1); }
        .status-pulse { animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
        .inner-alert { display:none; position:absolute; inset:0; background:rgba(255,255,255,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="loader" class="overlay"> <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-600 border-t-transparent mb-3"></div>
            <p class="text-pink-600 font-bold text-xs text-center">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <header class="pink-grad text-white px-6 py-6 sticky top-0 z-50 shadow-lg"> <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./โรงพยาบาลอุดรธานี .png" class="w-12 h-12 bg-white rounded-full p-1" alt="Logo">
                <div>
                    <h1 class="font-bold text-lg leading-tight">รพ.อุดรธานี (ITSM)</h1>
                    <p class="text-[10px] opacity-80">ระบบจัดการงานซ่อมและบริการ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="u-fname" class="text-xs font-bold leading-none"></p> <p id="u-type-name" class="text-[9px] opacity-70"></p> </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-xl">🚪</button> </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[88px] z-40 border-b border-pink-100"> <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab(1)" id="nav-t1" class="flex-1 py-4 text-xs font-bold border-b-4 border-pink-600 text-pink-600 uppercase">Dashboard</button>
            <button onclick="switchTab(2)" id="nav-t2" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase">My Jobs</button>
            <button onclick="switchTab(3)" id="nav-t3" class="flex-1 py-4 text-xs font-bold border-b-4 border-transparent text-slate-400 uppercase">Links</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        <div id="tab1" class="tab-content active space-y-4"> <div class="grid grid-cols-5 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">New</p><p id="count-wait" class="text-lg font-black text-pink-600">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Doing</p><p id="count-doing" class="text-lg font-black text-blue-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Spare</p><p id="count-spare" class="text-lg font-black text-orange-400">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Done</p><p id="count-done" class="text-lg font-black text-green-500">0</p></div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm"><p class="text-[9px] text-slate-400 font-bold uppercase">Cancel</p><p id="count-cancel" class="text-lg font-black text-slate-300">0</p></div>
            </div>
            <div id="job-list-dashboard" class="space-y-3"></div> </div>

        <div id="tab2" class="tab-content space-y-4"> <div id="job-list-myjob" class="space-y-3"></div>
            <div id="it-ticket-list" class="space-y-3"></div>
        </div>

        <div id="tab3" class="tab-content grid grid-cols-1 sm:grid-cols-2 gap-4"></div> </main>

    <div id="modal-detail" class="overlay"> <div class="bg-white rounded-[2rem] w-full max-w-md mx-4 shadow-2xl p-6">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-bold text-pink-600 text-lg">📄 รายละเอียดงาน</h3>
                <button onclick="closeModal('modal-detail')" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <div id="detail-content" class="space-y-4"></div> <div id="detail-actions" class="mt-6 flex flex-col gap-3"></div> </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzala43clqUn9Z9ky9BlAhcTq6Ang40koFQDi59q33spvLNQpcEFqc2_PJ-xT5NHx4/exec'; // URL ของ Google Apps Script
        let store = { AllJobs: [], ITTickets: [], StaffList: [], SystemLink: [], DeptList: [], BackupData: [] }; // ตัวแปรเก็บข้อมูลหลัก
        let currentUser = null; // เก็บข้อมูลผู้ใช้ที่ล็อกอิน
        let currentTab = 1; // เก็บสถานะ Tab ที่เปิดอยู่

        async function initApp() { // ฟังก์ชันเริ่มต้นเมื่อเปิดหน้าเว็บ
            const session = localStorage.getItem("it_session"); // ดึงข้อมูล Session จากเครื่อง
            if (!session) { window.location.replace("./login.html"); return; } // ถ้าไม่มีให้เด้งไปหน้า Login
            currentUser = JSON.parse(session); // แปลง JSON เป็น Object
            document.getElementById('u-fname').innerText = currentUser.UserName; // แสดงชื่อบนหัวเว็บ
            document.getElementById('u-type-name').innerText = currentUser.UserTypeName; // แสดงตำแหน่งบนหัวเว็บ
            await loadData(); // เรียกใช้ฟังก์ชันดึงข้อมูล
        }

        async function loadData() { // ฟังก์ชันดึงข้อมูลจาก API
            showLoading(true); // แสดงตัวหมุนรอโหลด
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData', data: { USERID: currentUser.USERID } }) }); // ยิง API ไปดึงข้อมูล
                const result = await res.json(); // รับค่ากลับมาเป็น JSON
                if (result.success) {
                    store = result; // บันทึกข้อมูลลง store
                    renderDashboard(); // สร้างรายการหน้าแรก
                }
            } catch (e) { console.error("Error"); }
            showLoading(false); // ปิดตัวหมุนรอโหลด
        }

        function renderDashboard() { // ฟังก์ชันสร้าง HTML รายการงาน
            const jobs = store.AllJobs || []; // ดึงงานทั้งหมดมาพักไว้
            updateStats(jobs); // อัปเดตตัวเลข 5 ช่องด้านบน
            document.getElementById('job-list-dashboard').innerHTML = jobs.map(j => `
                <div onclick="viewJobDetail('${j.JobID}')" class="card-pro p-5 border-l-8 ${j.Status === 'รอรับงาน' ? 'border-pink-500' : 'border-slate-200'} mb-3">
                    <h3 class="font-bold text-slate-700 text-sm">${j.Problem}</h3>
                    <p class="text-[9px] text-slate-400 font-bold">${j.JobID} | ${j.Department}</p>
                </div>
            `).join(''); // วนลูปสร้างการ์ดงาน
        }

        function updateStats(jobs) { // ฟังก์ชันนับจำนวนงานแยกตามสถานะ
            document.getElementById('count-wait').innerText = jobs.filter(j => j.Status === 'รอรับงาน').length; // นับงานรอ
            document.getElementById('count-doing').innerText = jobs.filter(j => j.Status === 'กำลังดำเนินการ').length; // นับงานกำลังทำ
            document.getElementById('count-done').innerText = jobs.filter(j => j.Status === 'เสร็จสิ้น').length; // นับงานเสร็จ
        }

        function viewJobDetail(jobId) { // ฟังก์ชันเปิดดูรายละเอียดงาน
            const job = store.AllJobs.find(j => String(j.JobID) === String(jobId)); // หางานที่ตรงกับ ID ที่กด
            if (!job) return;
            document.getElementById('detail-content').innerHTML = `<p class="font-bold">${job.Problem}</p><p class="text-xs">${job.Department}</p>`; // ใส่เนื้อหาลง Modal
            document.getElementById('modal-detail').style.display = 'flex'; // สั่งเปิด Modal
        }

        function switchTab(n) { // ฟังก์ชันสลับหน้าจอ Tab
            currentTab = n;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); // ซ่อนทุก Tab
            document.getElementById('tab' + n).classList.add('active'); // แสดงเฉพาะ Tab ที่เลือก
        }

        function logout() { // ฟังก์ชันกดปุ่มล็อกเอาต์
            localStorage.clear(); // ล้างข้อมูลการล็อกอินในเครื่อง
            window.location.replace("./login.html"); // เด้งไปหน้า Login
        }

        function showLoading(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; } // ฟังก์ชันเปิด/ปิดตัวโหลด
        function closeModal(id) { document.getElementById(id).style.display = 'none'; } // ฟังก์ชันปิด Modal

        document.addEventListener('DOMContentLoaded', initApp); // เมื่อ HTML โหลดเสร็จให้เริ่มรัน initApp
    </script> </body> </html> ```
