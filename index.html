<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-6">
    <h1 class="text-2xl font-bold mb-4">My Jobs</h1>
    <div id="jobList" class="grid gap-4"></div>
</div>

<!-- ================= MODAL SERVICE MA ================= -->
<div id="modal-service-ma" class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50">
  <div class="bg-white w-full max-w-lg rounded-lg shadow-lg p-6">
    <h2 class="text-xl font-bold mb-4">Service MA Report</h2>

    <input type="hidden" id="serviceJobId">

    <div class="mb-3">
      <label class="block mb-1">รายละเอียดงาน</label>
      <textarea id="serviceDetail" class="w-full border rounded p-2"></textarea>
    </div>

    <div class="mb-3">
      <label class="block mb-1">อะไหล่ที่ใช้</label>
      <input type="text" id="serviceSparePart" class="w-full border rounded p-2">
    </div>

    <div class="mb-3">
      <label class="block mb-1">ค่าใช้จ่าย</label>
      <input type="number" id="serviceCost" class="w-full border rounded p-2">
    </div>

    <div class="flex gap-3 mt-6">
      <button onclick="submitServiceMA()" class="bg-blue-600 text-white px-4 py-2 rounded">บันทึก</button>
      <button onclick="closeModal('modal-service-ma')" class="bg-gray-400 text-white px-4 py-2 rounded">ยกเลิก</button>
    </div>
  </div>
</div>

<script>

const API_URL = "YOUR_API_URL_HERE";

/* ================= API ================= */

async function apiFetch(action, data = {}) {
    const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action, data })
    });
    return await res.json();
}

/* ================= LOAD DATA ================= */

async function loadData() {
    const res = await apiFetch("getMyJobs");
    renderJobs(res.data || []);
}

function renderJobs(jobs) {
    const container = document.getElementById("jobList");
    container.innerHTML = "";

    jobs.forEach(job => {
        container.innerHTML += `
            <div class="bg-white p-4 rounded shadow">
                <div class="font-bold">${job.JobID}</div>
                <div>${job.Description || ""}</div>
                <button onclick="openServiceMAForm('${job.JobID}')" 
                    class="mt-3 bg-green-600 text-white px-3 py-1 rounded">
                    ปิดงาน
                </button>
            </div>
        `;
    });
}

/* ================= MODAL CONTROL ================= */

function openServiceMAForm(jobId) {
    document.getElementById("serviceJobId").value = jobId;
    document.getElementById("modal-service-ma").classList.remove("hidden");
    document.getElementById("modal-service-ma").classList.add("flex");
}

function closeModal(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add("hidden");
    el.classList.remove("flex");
}

/* ================= SUBMIT SERVICE MA ================= */

async function submitServiceMA() {

    const jobId = document.getElementById("serviceJobId").value;

    const data = {
        JobID: jobId,
        Detail: document.getElementById("serviceDetail").value,
        SparePart: document.getElementById("serviceSparePart").value,
        Cost: document.getElementById("serviceCost").value
    };

    const res = await apiFetch("saveServiceMA", data);

    if (res.success) {
        alert("บันทึกสำเร็จ");
        closeModal("modal-service-ma");
        await loadData();
    } else {
        alert("เกิดข้อผิดพลาด");
    }
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", loadData);

</script>

</body>
</html>
